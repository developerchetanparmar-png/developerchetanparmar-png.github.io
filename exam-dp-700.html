e and silver layers. •The data engineers must be able to commit changes to source control in WorkspaceA.","correctIndex":1},{"prompt":"You need to recommend a solution for handling old files. The solution must meet the technical requirements. What should you include in the recommendation?","options":["a data pipeline that includes a Copy data activity","a data pipeline that includes a Delete data activity","a notebook that runs the VACUUM command","a notebook that runs the OPTIMIZE command"],"explanation":"correct answer is C: a notebook that runs the VACUUM command. The VACUUM command is typically used to handle old files in a data lake or Delta table environment. It removes files that are no longer referenced by the current state of the table. This is essential for cleaning up outdated files and optimizing storage usage, while still preserving the technical requirements that ensure data integrity and compliance with retention policies.","correctIndex":2},{"prompt":"DRAG DROP\n-\nYou have a KQL database that contains a table named Readings.\nYou need to build a KQL query to compare the MeterReading value of each row to the previous row base on the\nTimestamp value.\nA sample of the expected output is shown in the following table.\nHow should you complete the query? To answer, drag the appropriate values the correct targets. Each value may\nbe used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view\ncontent.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"sort by Timestamp. This line sorts the filtered results (the Kansas readings) based on the values in the Timestamp column. extend PrevMeterReading = prev(MeterReading), PrevTimestamp = prev(Timestamp): This is where the magic of looking at previous rows happens. The extend operator adds new columns to your result set. project City, Area, MeterReading, Timestamp, PrevMeterReading, PrevTimestamp: The project operator selects which columns to keep in the final output and in what order they should appear.","correctText":"Explanation:"},{"prompt":"HOTSPOT\n-\nYou need to recommend a Fabric streaming solution that will use the sources shown in the following table.\nThe solution must minimize development effort.\nWhat should you include in the recommendation for each source? To answer, select the appropriate options in the\nanswer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Source1: A data pipeline. Data pipelines are used for orchestrating and scheduling data movement and transformation tasks. They support: Moving data between systems Running ETL jobs Integrating batch workloads. Source2: Apache Spark Structured Streaming. Apache Spark Structured Streaming is designed for real-time stream processing with high scalability. It's ideal when: You need custom logic or transformations You're processing event-based or IoT data in real time Often used in notebooks in Microsoft Fabric for advanced streaming logic. Source3: A streaming dataflow. Streaming dataflows in Microsoft Fabric provide a no-code/low-code interface for ingesting and transforming streaming data. Great for: Lightweight streaming pipelines Visual design of data transformations Power users or analysts who want to work with real-time data","correctText":"Explanation:"},{"prompt":"HOTSPOT -\nCase Study -\nThis is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study -\nTo display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\nOverview -\nLitware, Inc. is a publishing company that has an online bookstore and several retail bookstores worldwide. Litware\nalso manages an online advertising business for the authors it represents.\nExisting Environment. Fabric Environment\nLitware has a Fabric workspace named Workspace1. High concurrency is enabled for Workspace1.\nThe company has a data engineering team that uses Python for data processing.\nExisting Environment. Data Processing\nThe retail bookstores send sales data at the end of each business day, while the online bookstore constantly\nprovides logs and sales data to a central enterprise resource planning (ERP) system.\nLitware implements a medallion architecture by using the following three layers: bronze, silver, and gold. The sales\ndata is ingested from the ERP system as Parquet files that land in the Files folder in a lakehouse. Notebooks are\nused to transform the files in a Delta table for the bronze and silver layers. The gold layer is in a warehouse that\nhas V-Order disabled.\nLitware has image files of book covers in Azure Blob Storage. The files are loaded into the Files folder.\nExisting Environment. Sales Data\nMonth-end sales data is processed on the first calendar day of each month. Data that is older than one month\nnever changes.\nIn the source system, the sales data refreshes every six hours starting at midnight each day.\nThe sales data is captured in a Dataflow Gen1 dataflow. When the dataflow runs, new and historical data is\ncaptured. The dataflow captures the following fields of the source:\nSales Date -\nAuthor -\nPrice -\nUnits -\nSKU -\nA table named AuthorSales stores the sales data that relates to each author. The table contains a column named\nAuthorEmail. Authors authenticate to a guest Fabric tenant by using their email address.\nExisting Environment. Security Groups\nLitware has the following security groups:\nSales -\nFabric Admins -\nStreaming Admins -\nExisting Environment. Performance Issues\nBusiness users perform ad-hoc queries against the warehouse. The business users indicate that reports against\nthe warehouse sometimes run for two hours and fail to load as expected. Upon further investigation, the data\nengineering team receives the following error message when the reports fail to load: “The SQL query failed while\nrunning.”\nThe data engineering team wants to debug the issue and find queries that cause more than one failure.\nWhen the authors have new book releases, there is often an increase in sales activity. This increase slows the data\ningestion process.\nThe company’s sales team reports that during the last month, the sales data has NOT been up-to-date when they\narrive at work in the morning.\nRequirements. Planned Changes -\nLitware recently signed a contract to receive book reviews. The provider of the reviews exposes the data in\nAmazon Simple Storage Service (Amazon S3) buckets.\nLitware plans to manage Search Engine Optimization (SEO) for the authors. The SEO data will be streamed from a\nREST API.\nRequirements. Version Control -\nLitware plans to implement a version control solution in Fabric that will use GitHub integration and follow the\nprinciple of least privilege.\nRequirements. Governance Requirements\nTo control data platform costs, the data platform must use only Fabric services and items. Additional Azure\nresources must NOT be provisioned.\nRequirements. Data Requirements -\nLitware identifies the following data requirements:\nProcess the SEO data in near-real-time (NRT).\nMake the book reviews available in the lakehouse without making a copy of the data.\nWhen a new book cover image arrives in the Files folder, process the image as soon as possible.\nYou need to troubleshoot the ad-hoc query issue.\nHow should you complete the statement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"queryinsights.frequently_run_queries number_of_failed_runs > 1 only this table have the fields specified in the SELECT AND WHERE statements The data engineering team wants to debug the issue and find queries that cause more than one failure. https://learn.microsoft.com/en-us/sql/relational-databases/system-views/queryinsights-frequently-run- queries-transact-sql?view=fabric&preserve-view=true Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question. Overview. Company Overview - Contoso, Ltd. is an online retail company that wants to modernize its analytics platform by moving to Fabric. The company plans to begin using Fabric for marketing analytics. Overview. IT Structure - The company’s IT department has a team of data analysts and a team of data engineers that use analytics systems. The data engineers perform the ingestion, transformation, and loading of data. They prefer to use Python or SQL to transform the data. The data analysts query data and create semantic models and reports. They are qualified to write queries in Power Query and T-SQL. Existing Environment. Fabric - Contoso has an F64 capacity named Cap1. All Fabric users are allowed to create items. Contoso has two workspaces named WorkspaceA and WorkspaceB that currently use Pro license mode. Existing Environment. Source Systems Contoso has a point of sale (POS) system named POS1 that uses an instance of SQL Server on Azure Virtual Machines in the same Microsoft Entra tenant as Fabric. The host virtual machine is on a private virtual network that has public access blocked. POS1 contains all the sales transactions that were processed on the company’s website. The company has a software as a service (SaaS) online marketing app named MAR1. MAR1 has seven entities. The entities contain data that relates to email open rates and interaction rates, as well as website interactions. The data can be exported from MAR1 by calling REST APIs. Each entity has a different endpoint. Contoso has been using MAR1 for one year. Data from prior years is stored in Parquet files in an Amazon Simple Storage Service (Amazon S3) bucket. There are 12 files that range in size from 300 MB to 900 MB and relate to email interactions. Existing Environment. Product Data POS1 contains a product list and related data. The data comes from the following three tables: Products - ProductCategories - ProductSubcategories - In the data, products are related to product subcategories, and subcategories are related to product categories. Existing Environment. Azure - Contoso has a Microsoft Entra tenant that has the following mail-enabled security groups: DataAnalysts: Contains the data analysts DataEngineers: Contains the data engineers Contoso has an Azure subscription. The company has an existing Azure DevOps organization and creates a new project for repositories that relate to Fabric. Existing Environment. User Problems The VP of marketing at Contoso requires analysis on the effectiveness of different types of email content. It typically takes a week to manually compile and analyze the data. Contoso wants to reduce the time to less than one day by using Fabric. The data engineering team has successfully exported data from MAR1. The team experiences transient connectivity errors, which causes the data exports to fail. Requirements. Planned Changes - Contoso plans to create the following two lakehouses: Lakehouse1: Will store both raw and cleansed data from the sources Lakehouse2: Will serve data in a dimensional model to users for analytical queries Additional items will be added to facilitate data ingestion and transformation. Contoso plans to use Azure Repos for source control in Fabric. Requirements. Technical Requirements The new lakehouses must follow a medallion architecture by using the following three layers: bronze, silver, and gold. There will be extensive data cleansing required to populate the MAR1 data in the silver layer, including deduplication, the handling of missing values, and the standardizing of capitalization. Each layer must be fully populated before moving on to the next layer. If any step in populating the lakehouses fails, an email must be sent to the data engineers. Data imports must run simultaneously, when possible. The use of email data from the Amazon S3 bucket must meet the following requirements: Minimize egress costs associated with cross-cloud data access. Prevent saving a copy of the raw data in the lakehouses. Items that relate to data ingestion must meet the following requirements: The items must be source controlled alongside other workspace items. Ingested data must land in the bronze layer of Lakehouse1 in the Delta format. No changes other than changes to the file formats must be implemented before the data lands in the bronze layer. Development effort must be minimized and a built-in connection must be used to import the source data. In the event of a connectivity error, the ingestion processes must attempt the connection again. Lakehouses, data pipelines, and notebooks must be stored in WorkspaceA. Semantic models, reports, and dataflows must be stored in WorkspaceB. Once a week, old files that are no longer referenced by a Delta table log must be removed. Requirements. Data Transformation In the POS1 product data, ProductID values are unique. The product dimension in the gold layer must include only active products from product list. Active products are identified by an IsActive value of 1. Some product categories and subcategories are NOT assigned to any product. They are NOT analytically relevant and must be omitted from the product dimension in the gold layer. Requirements. Data Security - Security in Fabric must meet the following requirements: The data engineers must have read and write access to all the lakehouses, including the underlying files. The data analysts must only have read access to the Delta tables in the gold layer. The data analysts must NOT have access to the data in the bronze and silver layers. The data engineers must be able to commit changes to source control in WorkspaceA.","correctText":"Explanation:"},{"prompt":"You need to schedule the population of the medallion layers to meet the technical requirements. What should you do?","options":["Schedule a data pipeline that calls other data pipelines.","Schedule a notebook.","Schedule an Apache Spark job.","Schedule multiple data pipelines."],"explanation":"A. Schedule a data pipeline that calls other data pipelines. Schedule a data pipeline that calls other data pipelines: This approach allows you to orchestrate and manage the population of medallion layers efficiently. By scheduling a main data pipeline that calls other data pipelines, you can ensure that each step in the data processing workflow is executed in the correct sequence. This method provides better modularity and manageability, as each sub-pipeline can focus on a specific layer or task within the medallion architecture.","correctIndex":0},{"prompt":"DRAG DROP -\nYou have a Fabric eventhouse that contains a KQL database. The database contains a table named TaxiData. The\nfollowing is a sample of the data in TaxiData.\nYou need to build two KQL queries. The solution must meet the following requirements:\nOne of the queries must partition RunningTotalAmount by VendorID.\nThe other query must create a column named FirstPickupDateTime that shows the first value of each hour from\ntpep_pickup_datetime partitioned by payment_type.\nHow should you complete each query? To answer, drag the appropriate values the correct targets. Each value may\nbe used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view\ncontent.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Row_cumsum – Computes the cumulative sum of a column, resetting when a condition is met. Row_window_session – Groups records into sessions based on time intervals or other conditions.","correctText":"Explanation:"},{"prompt":"HOTSPOT -\nYou are processing streaming data from an external data provider.\nYou have the following code segment.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.","options":[],"correctText":"Explanation:"},{"prompt":"You have a Fabric workspace that contains a lakehouse named Lakehouse1. Lakehouse1 contains a Delta table named Table1. You analyze Table1 and discover that Table1 contains 2,000 Parquet files of 1 MB each. You need to minimize how long it takes to query Table1. What should you do?","options":["Disable V-Order and run the OPTIMIZE command.","Disable V-Order and run the VACUUM command.","Run the OPTIMIZE and VACUUM commands."],"explanation":"C. Run the OPTIMIZE and VACUUM commands. OPTIMIZE Command: Running the OPTIMIZE command on a Delta table helps to combine smaller files into larger ones, which can significantly improve query performance. This process, known as compaction, reduces the number of Parquet files that need to be read during a query, thereby decreasing query latency. In your case, with 2,000 Parquet files of 1 MB each, running OPTIMIZE will consolidate these files into fewer, larger files, making queries faster and more efficient. VACUUM Command: The VACUUM command cleans up old versions of data files that are no longer needed, which helps to free up storage space and maintain the performance of the Delta table. After running OPTIMIZE, it's a good practice to run VACUUM to remove any obsolete files and further streamline the data storage.","correctIndex":2},{"prompt":"You have a Fabric workspace that contains a warehouse named Warehouse1. Data is loaded daily into Warehouse1 g hub, select the latest failed run of Pipeline1, and then view the output JSON.","From Monitoring hub, select the latest failed run of Pipeline1, and then view the input JSON.","From Real-time hub, select Fabric events, and then review the details of Microsoft.Fabric.ItemReadFailed.","From Real-time hub, select Fabric events, and then review the details of Microsoft. Fabric.ItemUpdateFailed."],"explanation":"B. From Monitoring hub, select the latest failed run of Pipeline1, and then view the input JSON. Monitoring hub: The Monitoring hub provides detailed logs and information about the execution of your data pipelines. By selecting the latest failed run of Pipeline1, you can access the execution details and diagnose the issue. View the input JSON: The input JSON contains the parameters, configurations, and the dynamic SQL query used for the Copy data activity. By examining the input JSON, you can identify the specific SQL query that was executed at the time the pipeline failed. This information is crucial for troubleshooting the issue and understanding why the pipeline keeps failing.","correctIndex":1},{"prompt":"You have a Fabric notebook named Notebook1 that has been executing successfully for the last week. During the last run, Notebook1executed nine jobs. You need to view the jobs in a timeline chart. What should you use?","options":["Real-Time hub","Monitoring hub","the job history from the application run","Spark History Server","the run series from the details of the application run"],"explanation":"E. the run series from the details of the application run. The run series from the details of the application run: This option allows you to view a detailed timeline of the jobs that were executed during the last run of Notebook1. The run series provides a chronological view of all the jobs, including their start and end times, which enables you to visualize the execution timeline effectively.","correctIndex":4},{"prompt":"HOTSPOT -\nYou have a Fabric workspace t ins •Streaming Admins Existing Environment. Performance Issues Business users perform ad-hoc queries against the warehouse. The business users indicate that reports against the warehouse sometimes run for two hours and fail to load as expected. Upon further investigation, the data engineering team receives the following error message when the reports fail to load: “The SQL query failed while running.” The data engineering team wants to debug the issue and find queries that cause more than one failure. When the authors have new book releases, there is often an increase in sales activity. This increase slows the data ingestion process. The company’s sales team reports that during the last month, the sales data has NOT been up-to-date when they arrive at work in the morning. Requirements. Planned Changes - Litware recently signed a contract to receive book reviews. The provider of the reviews exposes the data in Amazon Simple Storage Service (Amazon S3) buckets. Litware plans to manage Search Engine Optimization (SEO) for the authors. The SEO data will be streamed from a REST API. Requirements. Version Control - Litware plans to implement a version control solution in Fabric that will use GitHub integration and follow the principle of least privilege. Requirements. Governance Requirements To control data platform costs, the data platform must use only Fabric services and items. Additional Azure resources must NOT be provisioned. Requirements. Data Requirements - Litware identifies the following data requirements: •Process the SEO data in near-real-time (NRT). •Make the book reviews available in the lakehouse without making a copy of the data. •When a new book cover image arrives in the Files folder, process the image as soon as possible. What should you do to optimize the query experience for the business users? A. Enable V-Order. B. Create and update statistics. C. Run the VACUUM command. D. Introduce primary keys.","correctText":"Explanation:"},{"prompt":"","options":[],"explanation":"B. Create and update statistics. Creating and updating statistics helps optimize query performance by providing the query engine with accurate information about the data distribution. This allows the engine to generate efficient query execution plans, ultimately improving the query experience for business users.","correctText":"B"},{"prompt":"You have a Fabric workspace that contains a warehouse named Warehouse1. While monitoring Warehouse1, you discover that query performance has degraded during the last 60 minutes. You need to isolate all the queries that were run during the last 60 minutes. The results must include the username of the users that submitted the queries and the query statements. What should you use?","options":["the Microsoft Fabric Capacity Metrics app","views from the queryinsights schema","Query activity","the sys.dm_exec_requests dynamic management view"],"explanation":"B. views from the queryinsights schema . The queryinsights schema in Microsoft Fabric provides detailed information about query execution, including the username of the users who submitted the queries and the query statements themselves. By using the relevant views from the queryinsights schema, you can isolate and analyze all queries executed during the specified time frame, which is essential for troubleshooting performance issues.","correctIndex":1},{"prompt":"You have a Fabric workspace that contains a semantic model named Model1. You need to monitor the refresh history of Model1 and visualize the refresh history in a chart. What should you use?","options":["the refresh history from the settings of Model1","a notebook","a Dataflow Gen2 dataflow","a data pipeline"],"explanation":"B. a notebook In Microsoft Fabric, if you want to monitor the refresh history of a semantic model (Model1) and visualize that data in a chart, a notebook is the most flexible and capable tool. They are asking to visualize the data as well. Which is possible via notebook.","correctIndex":1},{"prompt":"You have a Fabric workspace that contains a write-intensive warehouse named DW1. DW1 stores staging tables that are used to load a dimensional model. The tables are often read once, dropped, and then recreated to process new data. You need to minimize the load time of DW1. What should you do?","options":["Enable V-Order.","Create statistics.","Drop statistics.","Disable V-Order."],"explanation":"D. Disable V-Order. V-Order is an optimized format for query performance in analytical workloads. However, since DW1 is write- intensive and the staging tables are primarily read once and recreated, enabling V-Order could increase the write overhead. Disabling V-Order minimizes the load time in this specific scenario, as it eliminates the cost associated with reorganizing data into the V-Order format. Thank you Thank you for being so interested in the premium exam material. I'm glad to hear that you found it informative and helpful. If you have any feedback or thoughts on the bumps, I would love to hear them. Your insights can help me improve our writing and better understand our readers. Best of Luck You have worked hard to get to this point, and you are well-prepared for the exam Keep your head up, stay positive, and go show that exam what you're made of! Total: 108 Questions Link: https://certyiq.com/papers/microsoft/dp-700 Feedback More Papers","correctIndex":3}]}</script>
