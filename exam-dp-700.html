eives the following error message when the reports fail to load: “The SQL query failed while running.” The data engineering team wants to debug the issue and find queries that cause more than one failure. When the authors have new book releases, there is often an increase in sales activity. This increase slows the data ingestion process. The company’s sales team reports that during the last month, the sales data has NOT been up-to-date when they arrive at work in the morning. Requirements. Planned Changes - Litware recently signed a contract to receive book reviews. The provider of the reviews exposes the data in Amazon Simple Storage Service (Amazon S3) buckets. Litware plans to manage Search Engine Optimization (SEO) for the authors. The SEO data will be streamed from a REST API. Requirements. Version Control - Litware plans to implement a version control solution in Fabric that will use GitHub integration and follow the principle of least privilege. Requirements. Governance Requirements To control data platform costs, the data platform must use only Fabric services and items. Additional Azure resources must NOT be provisioned. Requirements. Data Requirements - Litware identifies the following data requirements: Process the SEO data in near-real-time (NRT). Make the book reviews available in the lakehouse without making a copy of the data. When a new book cover image arrives in the Files folder, process the image as soon as possible.","correctIndex":1},{"prompt":"You need to resolve the sales data issue. The solution must minimize the amount of data transferred. What should you do?","options":["Spilt the dataflow into two dataflows.","Configure scheduled refresh for the dataflow.","Configure incremental refresh for the dataflow. Set Store rows from the past to 1 Month.","Configure incremental refresh for the dataflow. Set Refresh rows from the past to 1 Year.","Configure incremental refresh for the dataflow. Set Refresh rows from the past to 1 Month."],"explanation":"E. Configure incremental refresh for the dataflow. Set Refresh rows from the past to 1 Month. This approach ensures minimal data transfer while keeping the refresh scope limited to the most recent and relevant data (1 month), which is aligned with the requirement to minimize data transfer.","correctIndex":4},{"prompt":"HOTSPOT -\nCase Study -\nThis is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study -\nTo display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\nOverview. Company Overview -\nContoso, Ltd. is an online retail company that wants to modernize its analytics platform by moving to Fabric. The\ncompany plans to begin using Fabric for marketing analytics.\nOverview. IT Structure -\nThe company’s IT department has a team of data analysts and a team of data engineers that use analytics\nsystems.\nThe data engineers perform the ingestion, transformation, and loading of data. They prefer to use Python or SQL to\ntransform the data.\nThe data analysts query data and create semantic models and reports. They are qualified to write queries in Power\nQuery and T-SQL.\nExisting Environment. Fabric -\nContoso has an F64 capacity named Cap1. All Fabric users are allowed to create items.\nContoso has two workspaces named WorkspaceA and WorkspaceB that currently use Pro license mode.\nExisting Environment. Source Systems\nContoso has a point of sale (POS) system named POS1 that uses an instance of SQL Server on Azure Virtual\nMachines in the same Microsoft Entra tenant as Fabric. The host virtual machine is on a private virtual network that\nhas public access blocked. POS1 contains all the sales transactions that were processed on the company’s\nwebsite.\nThe company has a software as a service (SaaS) online marketing app named MAR1. MAR1 has seven entities. The\nentities contain data that relates to email open rates and interaction rates, as well as website interactions. The\ndata can be exported from MAR1 by calling REST APIs. Each entity has a different endpoint.\nContoso has been using MAR1 for one year. Data from prior years is stored in Parquet files in an Amazon Simple\nStorage Service (Amazon S3) bucket. There are 12 files that range in size from 300 MB to 900 MB and relate to\nemail interactions.\nExisting Environment. Product Data\nPOS1 contains a product list and related data. The data comes from the following three tables:\nProducts -\nProductCategories -\nProductSubcategories -\nIn the data, products are related to product subcategories, and subcategories are related to product categories.\nExisting Environment. Azure -\nContoso has a Microsoft Entra tenant that has the following mail-enabled security groups:\nDataAnalysts: Contains the data analysts\nDataEngineers: Contains the data engineers\nContoso has an Azure subscription.\nThe company has an existing Azure DevOps organization and creates a new project for repositories that relate to\nFabric.\nExisting Environment. User Problems\nThe VP of marketing at Contoso requires analysis on the effectiveness of different types of email content. It\ntypically takes a week to manually compile and analyze the data. Contoso wants to reduce the time to less than\none day by using Fabric.\nThe data engineering team has successfully exported data from MAR1. The team experiences transient\nconnectivity errors, which causes the data exports to fail.\nRequirements. Planned Changes -\nContoso plans to create the following two lakehouses:\nLakehouse1: Will store both raw and cleansed data from the sources\nLakehouse2: Will serve data in a dimensional model to users for analytical queries\nAdditional items will be added to facilitate data ingestion and transformation.\nContoso plans to use Azure Repos for source control in Fabric.\nRequirements. Technical Requirements\nThe new lakehouses must follow a medallion architecture by using the following three layers: bronze, silver, and\ngold. There will be extensive data cleansing required to populate the MAR1 data in the silver layer, including\ndeduplication, the handling of missing values, and the standardizing of capitalization.\nEach layer must be fully populated before moving on to the next layer. If any step in populating the lakehouses\nfails, an email must be sent to the data engineers.\nData imports must run simultaneously, when possible.\n\n\nThe use of email data from the Amazon S3 bucket must meet the following requirements:\nMinimize egress costs associated with cross-cloud data access.\nPrevent saving a copy of the raw data in the lakehouses.\nItems that relate to data ingestion must meet the following requirements:\nThe items must be source controlled alongside other workspace items.\nIngested data must land in the bronze layer of Lakehouse1 in the Delta format.\nNo changes other than changes to the file formats must be implemented before the data lands in the bronze layer.\nDevelopment effort must be minimized and a built-in connection must be used to import the source data.\nIn the event of a connectivity error, the ingestion processes must attempt the connection again.\nLakehouses, data pipelines, and notebooks must be stored in WorkspaceA. Semantic models, reports, and\ndataflows must be stored in WorkspaceB.\nOnce a week, old files that are no longer referenced by a Delta table log must be removed.\nRequirements. Data Transformation\nIn the POS1 product data, ProductID values are unique. The product dimension in the gold layer must include only\nactive products from product list. Active products are identified by an IsActive value of 1.\nSome product categories and subcategories are NOT assigned to any product. They are NOT analytically relevant\nand must be omitted from the product dimension in the gold layer.\nRequirements. Data Security -\nSecurity in Fabric must meet the following requirements:\nThe data engineers must have read and write access to all the lakehouses, including the underlying files.\nThe data analysts must only have read access to the Delta tables in the gold layer.\nThe data analysts must NOT have access to the data in the bronze and silver layers.\nThe data engineers must be able to commit changes to source control in WorkspaceA.\nYou need to recommend a method to populate the POS1 data to the lakehouse medallion layers.\nWhat should you recommend for each layer? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1.Bronze Layer: A pipeline Copy activity. The Bronze Layer is typically the raw data ingestion layer in a medallion architecture. A Copy activity in a pipeline is commonly used in Azure Data Factory (ADF) or Synapse Pipelines to ingest and store raw data into the Bronze Layer (such as a Data Lake or Delta Lake). This choice ensures efficient and scalable data ingestion from various sources. 2.Silver Layer: A notebook. The Silver Layer is used for data transformation and cleansing. A notebook (such as an Azure Databricks or Synapse notebook) is often used to apply transformations, perform data validation, and enrich the raw ingested data. This choice aligns with the goal of refining, structuring, and preparing the data before moving it to the Gold Layer. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you ar ross-cloud data access. Prevent saving a copy of the raw data in the lakehouses. Items that relate to data ingestion must meet the following requirements: The items must be source controlled alongside other workspace items. Ingested data must land in the bronze layer of Lakehouse1 in the Delta format. No changes other than changes to the file formats must be implemented before the data lands in the bronze layer. Development effort must be minimized and a built-in connection must be used to import the source data. In the event of a connectivity error, the ingestion processes must attempt the connection again. Lakehouses, data pipelines, and notebooks must be stored in WorkspaceA. Semantic models, reports, and dataflows must be stored in WorkspaceB. Once a week, old files that are no longer referenced by a Delta table log must be removed. Requirements. Data Transformation In the POS1 product data, ProductID values are unique. The product dimension in the gold layer must include only active products from product list. Active products are identified by an IsActive value of 1. Some product categories and subcategories are NOT assigned to any product. They are NOT analytically relevant and must be omitted from the product dimension in the gold layer. Requirements. Data Security - Security in Fabric must meet the following requirements: The data engineers must have read and write access to all the lakehouses, including the underlying files. The data analysts must only have read access to the Delta tables in the gold layer. The data analysts must NOT have access to the data in the bronze and silver layers. The data engineers must be able to commit changes to source control in WorkspaceA.","correctText":"Explanation:"},{"prompt":"You need to ensure that usage of the data in the Amazon S3 bucket meets the technical requirements. What should you do?","options":["Create a workspace identity and enable high concurrency for the notebooks.","Create a shortcut and ensure that cachi e: IsActive = 1 These selections ensure that: All products are retained, even if they are not assigned to a subcategory. Only valid categories and subcategories assigned to products are included. Only active products are considered. The first join should be a LEFT OUTER JOIN to ensure that all products are retained, even if they are not assigned to a subcategory. The second join should be an INNER JOIN to exclude categories and subcategories that are not linked to any product, as they are not analytically relevant. Only active products, identified by an IsActive value of 1, should be included in the product dimension in the gold layer. Additionally, in the POS1 product data, ProductID values are unique. Categories and subcategories without assigned products must be omitted to maintain analytical relevance. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as bu ze from 300 MB to 900 MB and relate to email interactions. Existing Environment. Product Data POS1 contains a product list and related data. The data comes from the following three tables: Products - ProductCategories - ProductSubcategories - In the data, products are related to product subcategories, and subcategories are related to product categories. Existing Environment. Azure - Contoso has a Microsoft Entra tenant that has the following mail-enabled security groups: DataAnalysts: Contains the data analysts DataEngineers: Contains the data engineers Contoso has an Azure subscription. The company has an existing Azure DevOps organization and creates a new project for repositories that relate to Fabric. Existing Environment. User Problems The VP of marketing at Contoso requires analysis on the effectiveness of different types of email content. It typically takes a week to manually compile and analyze the data. Contoso wants to reduce the time to less than one day by using Fabric. The data engineering team has successfully exported data from MAR1. The team experiences transient connectivity errors, which causes the data exports to fail. Requirements. Planned Changes - Contoso plans to create the following two lakehouses: Lakehouse1: Will store both raw and cleansed data from the sources Lakehouse2: Will serve data in a dimensional model to users for analytical queries Additional items will be added to facilitate data ingestion and transformation. Contoso plans to use Azure Repos for source control in Fabric. Requirements. Technical Requirements The new lakehouses must follow a medallion architecture by using the following three layers: bronze, silver, and gold. There will be extensive data cleansing required to populate the MAR1 data in the silver layer, including deduplication, the handling of missing values, and the standardizing of capitalization. Each layer must be fully populated before moving on to the next layer. If any step in populating the lakehouses fails, an email must be sent to the data engineers. Data imports must run simultaneously, when possible. The use of email data from the Amazon S3 bucket must meet the following requirements: Minimize egress costs associated with cross-cloud data access. Prevent saving a copy of the raw data in the lakehouses. Items that relate to data ingestion must meet the following requirements: The items must be source controlled alongside other workspace items. Ingested data must land in the bronze layer of Lakehouse1 in the Delta format. No changes other than changes to the file formats must be implemented before the data lands in the bronze layer. Development effort must be minimized and a built-in connection must be used to import the source data. In the event of a connectivity error, the ingestion processes must attempt the connection again. Lakehouses, data pipelines, and notebooks must be stored in WorkspaceA. Semantic models, reports, and dataflows must be stored in WorkspaceB. Once a week, old files that are no longer referenced by a Delta table log must be removed. Requirements. Data Transformation In the POS1 product data, ProductID values are unique. The product dimension in the gold layer must include only active products from product list. Active products are identified by an IsActive value of 1. Some product categories and subcategories are NOT assigned to any product. They are NOT analytically relevant and must be omitted from the product dimension in the gold layer. Requirements. Data Security - Security in Fabric must meet the following requirements: The data engineers must have read and write access to all the lakehouses, including the underlying files. The data analysts must only have read access to the Delta tables in the gold layer. The data analysts must NOT have access to the data in the bronze and silver layers. The data engineers must be able to commit changes to source control in WorkspaceA.","correctText":"Explanation:"},{"prompt":"You need to populate the MAR1 data in the bronze layer. Which two types of activities should you include in the pipeline? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["ForEach","Copy data","WebHook","Stored procedure"],"explanation":"ForEach : This activity allows you to iterate over a collection of items and execute activities for each item. In this context, it can be used to process multiple datasets or files within the bronze layer, ensuring that each file is appropriately handled and transformed. Copy Data : This activity is fundamental in pipelines for data movement. It enables you to copy data from a source to a destination, such as moving data from a staging area to the bronze layer. The Copy Data activity can read the MAR1 data from its source and write it to the bronze layer, ensuring the data is properly ingested.","correctText":"AB"},{"prompt":"HOTSPOT -\nYou have a Fabric workspace that contains a warehouse named Warehouse1. Warehouse1 contains the following\ntables and columns.\nYou need to denormalize the tables and include the ContractType and StartDate columns in the Employee table.\nThe solution must meet the following requirements:\nEnsure that the StartDate column is of the date data type.\nEnsure that all the rows from the Employee table are preserved and include any matching rows from the Contract\ntable.\nEnsure that the result set displays the total number of employees per contract type for all the contract types that\nhave more than two employees.\nHow should you complete the statement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1. CONVERT(date, c.StartDate) as StartDate The CONVERT function is used to explicitly convert data types in SQL Server. In this case, it converts c.StartDate to date format, which is appropriate. 2. LEFT OUTER JOIN between Employee and Contract tables A LEFT OUTER JOIN ensures all employees are included, even if they do not have a corresponding contract. If some employees do not have contracts, this join type ensures they are still listed with NULL contract values. 3. HAVING COUNT(DISTINCT EmployeeID) > 2 HAVING is used because COUNT(DISTINCT EmployeeID) is an aggregate function, and aggregate functions cannot be used in WHERE. HAVING filters groups after aggregation.","correctText":"Explanation:"},{"prompt":"HOTSPOT -\nYou have an Azure Event Hubs data source that contains weather data.\nYou ingest the data from the data source by using an eventstream named Eventstream1. Eventstream1 uses a\nlakehouse as the destination.\nYou need to batch ingest only rows from the data source where the City attribute has a value of Kansas. The filter\nmust be added before the destination. The solution must minimize development effort.\nWhat should you use for the data processor and filtering? To answer, select the appropriate options in the answer\narea.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1. Data Processor: An eventstream with an external data source. Eventstream refers to real-time streaming data processing. Selecting \"An eventstream with an external data source\" means data is coming from an external system such as IoT devices, logs, or real-time telemetry. This is appropriate when dealing with real-time ingestion from sources like Azure Event Hubs, IoT Hub, or Kafka. 2.Filtering: An eventstream processor. Filtering in streaming systems typically happens during real-time data ingestion to remove irrelevant or unnecessary events before further processing. An eventstream processor can be used to apply transformations, filtering, and aggregations dynamically. This ensures that only relevant data moves forward in the pipeline.","correctText":"Explanation:"},{"prompt":"You have a Fabric workspace that contains an eventstream named Eventstream1. Eventstream1 processes data from a thermal sensor by using event stream processing, and then stores the data in a lakehouse. You need to modify Eventstream1 to include the standard deviation of the temperature. Which transform operator should you include in the Eventstream1 logic?","options":["Expand","Group by","Union","Aggregate"],"explanation":"The Group by transform operator contains the Standard deviation aggregation. The Aggregate transform operator only contains Average, Max, Min and Sum aggregation. Reference: https://learn.microsoft.com/en-us/fabric/real-time-intelligence/event-streams/process-events-using-event- processor-editor?pivots=standard-capabilities#group-by","correctIndex":1},{"prompt":"You have an Azure event hub. Each event contains the following fields: BikepointID - Street - Neighbourhood - Latitude - Longitude - No_Bikes - No_Empty_Docks - You need to ingest the events. The solution must only retain events that have a Neighbourhood value of Chelsea, and then store the retained events in a Fabric lakehouse. What should you use?","options":["a KQL queryset","an eventstream","a streaming dataset","Apache Spark Structured Streaming"],"explanation":"B. an eventstream. Eventstream: An eventstream is specifically designed for processing and managing events in real-time. It allows you to filter, transform, and route events efficiently. In this scenario, you can configure the eventstream to retain only the events where the Neighbourhood value is \"Chelsea\" and then store the filtered events in a Fabric lakehouse. This approach ensures that only the relevant events are ingested, adhering to the requirement to retain only specific events based on the Neighbourhood value.","correctIndex":1},{"prompt":"HOTSPOT -\nYou are building a data loading pattern for Fabric notebook workloads.\nYou have the following code segment:\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"\"The target table will always be overwritten.\" Selected Answer: No In many data loading strategies, especially when using incremental loads or merge operations, the target table is not always overwritten. Instead, new data is appended, updated, or merged based on keys. Overwriting usually happens in full refresh scenarios, which is not always the case. \"The merge operation will always run.\" Selected Answer: No The merge operation (such as SQL MERGE or Delta Lake MERGE INTO) only runs if certain conditions are met, such as the presence of new or changed data. If there is no data to update or merge, it may not execute. Thus, it's correct to say that it does not always run. \"The loading pattern supports both full and incremental loading requirements.\" Selected Answer: Yes A well-designed data pipeline often supports both full and incremental loads. Full loads replace the entire dataset, while incremental loads append or update only changed records. Since this is a common practice, selecting \"Yes\" is correct.","correctText":"Explanation:"},{"prompt":"HOTSPOT -\nYou have a Fabric workspace that contains two lakehouses named Lakehouse1 and Lakehouse2. Lakehouse1\ncontains staging data in a Delta table named Orderlines. Lakehouse2 contains a Type 2 slowly changing dimension\n(SCD) dimension table named Dim_Customer.\nYou need to build a query that will combine data from Orderlines and Dim_Customer to create a new fact table\nnamed Fact_Orders. The new table must meet the following requirements:\nEnable the analysis of customer orders based on historical attributes.\nEnable the analysis of customer orders based on the current attributes.\nHow should you complete the statement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1.o.OrderDate >= c.valid_from_datetime This ensures that the OrderDate falls on or after the start of the valid period. This is essential to capture all orders that are valid based on the entity's timeline. 2.o.OrderDate < c.valid_to_datetime This ensures that the OrderDate is strictly before the valid end date. This prevents fetching orders that occur after the entity has expired.","correctText":"Explanation:"},{"prompt":"You have a Fabric workspace that contains a lakehouse named Lakehouse1. In an external data source, you have data files that are 500 GB each. A new file is added every day. You need to ingest the data into Lakehouse1 without applying any transformations. The solution must meet the following requirements Trigger the process when a new file is added. Provide the highest throughput. Which type of item should you use to ingest the data?","options":["Eventstream","Dataflow Gen2","Streaming dataset","Data pipeline"],"explanation":"D. Data pipeline. Data pipeline: A data pipeline is designed to handle large-scale data ingestion and movement efficiently. It can be configured to automatically trigger the ingestion process when a new file is added to the external data source, ensuring that the data is ingested into Lakehouse1 as soon as it becomes available. Data pipelines are optimized for high throughput, making them suitable for handling large files (like the 500 GB files mentioned) and ensuring the process is both fast and efficient.","correctIndex":3},{"prompt":"You have a Fabric workspace that contains a lakehouse named Lakehouse1. In an external data source, you have data files that are 500 GB each. A new file is added every day. You need to ingest the data into Lakehouse1 without applying any transformations. The solution must meet the following requirements Trigger the process when a new file is added. Provide the highest throughput. Which type of item should you use to ingest the data?","options":["Data pipeline","Environment","KQL queryset","Dataflow Gen2"],"explanation":"A. Data pipeline. Data Pipeline: Data pipelines in Fabric are designed for high-throughput data ingestion and can be triggered automatically when new files are added to the external data source. They are optimized for moving large volumes of data efficiently and can handle the ingestion of 500 GB files without applying transformations.","correctIndex":0},{"prompt":"You have a Fabric workspace that contains an eventhouse and a KQL database named Database1. Database1 has the following: A table named Table1 - A table named Table2 - An update policy named Policy1 - Policy1 sends data from Table1 to Table2. The following is a sample of the data in Table2. Recently, the following actions were performed on Table1: An additional element named temperature was added to the StreamData column. The data type of the Timestamp column was changed to date. The data type of the DeviceId column was changed to string. You plan to load additional records to Table2. Which two records will load from Table1 to Table2? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Record B loads because it conforms to the updated schema (string DeviceId, StreamData with temperature). Record D loads because it conforms to the original schema (guid DeviceId, no temperature in StreamData).","correctText":"BD"},{"prompt":"HOTSPOT -\nYou have a Fabric workspace.\nYou are debugging a statement and discover the following issues:\nSometimes, the statement fails to return all the expected rows.\nThe PurchaseDate output column is NOT in the expected format of mmm dd, yy.\nYou need to resolve the issues. The solution must ensure that the data types of the results are retained. The results\ncan contain blank cells.\nHow should you complete the statement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1. try_cast(item_name as varchar(20)) Function: TRY_CAST() is a safer alternative to CAST(), introduced in SQL Server 2012. Purpose: Attempts to convert item_name into a VARCHAR(20). If conversion fails, it returns NULL instead of an error. 2. convert(varchar, purchase_date, 7) Function: CONVERT() is used to transform purchase_date into a string (VARCHAR). Purpose: Converts purchase_date to a specific date format. Format Code 7 (British/French Format): 7 corresponds to dd/mm/yy (e.g., 05/02/25 for February 5, 2025). Useful when presenting dates in a human-readable format.","correctText":"Explanation:"},{"prompt":"You are developing a data pipeline named Pipeline1. You need to add a Copy data activity that will copy data from a Snowflake data source to a Fabric warehouse. What should you configure?","options":["Degree of copy parallelism","Fault tolerance","Enable staging","Enable logging"],"explanation":"Enable Staging: When copying data from a Snowflake data source to a Fabric warehouse, enabling staging can significantly improve the efficiency and reliability of the data transfer process. Staging involves temporarily storing the data in an intermediate location before loading it into the final destination. This approach helps in handling large datasets and complex transformations, ensuring that the data is transferred smoothly without interruptions. It also allows for more manageable and optimized data movement, particularly when dealing with different data storage systems like Snowflake and Fabric. Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution. After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.","correctIndex":2},{"prompt":"You have a KQL database that contains two tables named Stream and Reference. Stream contains streaming data in the following format. Reference contains reference data in the following format. Both tables conta ream and Reference. Stream contains streaming data in the following format. Reference contains reference data in the following format. Both tables contain millions of rows. You have the following KQL queryset. You need to reduce how long it takes to run the KQL queryset. Solution: You move the filter to line 02. Does this meet the goal?","options":["Yes","No"],"explanation":"Yes. By applying the `where` clause early in the query, you reduce the number of rows processed in subsequent operations, which improves performance. Note: This question is part of a series of questions that present the same scenario. Each question in the series contains a unique solution that might meet the stated goals. Some question sets might have more than one correct solution, while others might not have a correct solution. After you answer a question in this section, you will NOT be able to return to it. As a result, these questions will not appear in the review screen.","correctIndex":0},{"prompt":"You have a KQL database that contains two tables named Stream and Reference. Stream contains streaming data in the following format. Reference contains reference data in the following format. Both tables contain millions of rows. You have the following KQL queryset. You need to reduce how long it takes to run the KQL queryset. Solution: You add the make_list() function to the output columns. Does this meet the goal?","options":["Yes","No"],"explanation":"No. The `make_list()` function aggregates values into a list, which can be useful for certain types of analysis but does not inherently improve query performance. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question. Overview - Litware, Inc. is a publishing company that has an online bookstore and several retail bookstores worldwide. Litware also manages an online advertising business for the authors it represents. Existing Environment. Fabric Environment Litware has a Fabric workspace named Workspace1. High concurrency is enabled for Workspace1. The company has a data engineering team that uses Python for data processing. Existing Environment. Data Processing The retail bookstores send sales data at the end of each business day, while the online bookstore constantly provides logs and sales data to a central enterprise resource planning (ERP) system. Litware implements a medallion architecture by using the following three layers: bronze, silver, and gold. The sales data is ingested from the ERP system as Parquet files that land in the Files folder in a lakehouse. Notebooks are used to transform the files in a Delta table for the bronze and silver layers. The gold layer is in a warehouse that has V-Order disabled. Litware has image files of book covers in Azure Blob Storage. The files are loaded into the Files folder. Existing Environment. Sales Data Month-end sales data is processed on the first calendar day of each month. Data that is older than one month never changes. In the source system, the sales data refreshes every six hours starting at midnight each day. The sales data is captured in a Dataflow Gen1 dataflow. When the dataflow runs, new and historical data is captured. The dataflow captures the following fields of the source: •Sales Date •Author •Price •Units •SKU A table named AuthorSales stores the sales data that relates to each author. The table contains a column named AuthorEmail. Authors authenticate to a guest Fabric tenant by using their email address. Existing Environment. Security Groups Litware has the following security groups: •Sales •Fabric Admins •Streaming Admins Existing Environment. Performance Issues Business users perform ad-hoc queries against the warehouse. The business users indicate that reports against the warehouse sometimes run for two hours and fail to load as expected. Upon further investigation, the data engineering team receives the following error message when the reports fail to load: “The SQL query failed while running.” The data engineering team wants to debug the issue and find queries that cause more than one failure. When the authors have new book releases, there is often an increase in sales activity. This increase slows the data ingestion process. The company’s sales team reports that during the last month, the sales data has NOT been up-to-date when they arrive at work in the morning. Requirements. Planned Changes - Litware recently signed a contract to receive book reviews. The provider of the reviews exposes the data in Amazon Simple Storage Service (Amazon S3) buckets. Litware plans to manage Search Engine Optimization (SEO) for the authors. The SEO data will be streamed from a REST API. Requirements. Version Control - Litware plans to implement a version control solution in Fabric that will use GitHub integration and follow the principle of least privilege. Requirements. Governance Requirements To control data platform costs, the data platform must use only Fabric services and items. Additional Azure resources must NOT be provisioned. Requirements. Data Requirements - Litware identifies the following data requirements: •Process the SEO data in near-real-time (NRT). •Make the book reviews available in the lakehouse without making a copy of the data. •When a new book cover image arrives in the Files folder, process the image as soon as possible.","correctIndex":1},{"prompt":"You need to create a workflow for the new book cover images. Which two components should you include in the workflow? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["a time-based schedule","a streaming dataflow","a blob storage action","a data pipeline","a notebook that uses Apache Spark Structured Streaming","a reflex item"],"explanation":"C. A blob storage action: This is essential for storing and managing the book cover images. D. A data pipeline: This helps in processing and transferring the images efficiently. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is in nment. Sales Data Month-end sales data is processed on the first calendar day of each month. Data that is older than one month never changes. In the source system, the sales data refreshes every six hours starting at midnight each day. The sales data is captured in a Dataflow Gen1 dataflow. When the dataflow runs, new and historical data is captured. The dataflow captures the following fields of the source: •Sales Date •Author •Price •Units •SKU A table named AuthorSales stores the sales data that relates to each author. The table contains a column named AuthorEmail. Authors authenticate to a guest Fabric tenant by using their email address. Existing Environment. Security Groups Litware has the following security groups: •Sales •Fabric Admins •Streaming Admins Existing Environment. Performance Issues Business users perform ad-hoc queries against the warehouse. The business users indicate that reports against the warehouse sometimes run for two hours and fail to load as expected. Upon further investigation, the data engineering team receives the following error message when the reports fail to load: “The SQL query failed while running.” The data engineering team wants to debug the issue and find queries that cause more than one failure. When the authors have new book releases, there is often an increase in sales activity. This increase slows the data ingestion process. The company’s sales team reports that during the last month, the sales data has NOT been up-to-date when they arrive at work in the morning. Requirements. Planned Changes - Litware recently signed a contract to receive book reviews. The provider of the reviews exposes the data in Amazon Simple Storage Service (Amazon S3) buckets. Litware plans to manage Search Engine Optimization (SEO) for the authors. The SEO data will be streamed from a REST API. Requirements. Version Control - Litware plans to implement a version control solution in Fabric that will use GitHub integration and follow the principle of least privilege. Requirements. Governance Requirements To control data platform costs, the data platform must use only Fabric services and items. Additional Azure resources must NOT be provisioned. Requirements. Data Requirements - Litware identifies the following data requirements: •Process the SEO data in near-real-time (NRT). •Make the book reviews available in the lakehouse without making a copy of the data. •When a new book cover image arrives in the Files folder, process the image as soon as possible. What should you recommend that the data engineering team use to ingest the SEO data? A. a streaming dataflow B. a streaming dataset C. a notebook that uses Apache Spark Structured Streaming D. an eventstream","correctText":"CD"},{"prompt":"","options":[],"explanation":"D. an eventstream. Microsoft Fabric Eventstream is a modern tool designed specifically for real-time data ingestion and processing scenarios in Fabric. It supports: Near-real-time data capture from various sources (IoT hubs, Event Hubs, etc.) Integration with lakehouses, data warehouses, KQL databases, and Power BI Processing and routing of streaming data to multiple destinations This makes Eventstream the ideal choice for NRT SEO data ingestion in a Fabric environment.","correctText":"D"},{"prompt":"HOTSPOT\n-\nYou have a Fabric warehouse named DW1 that contains four staging tables named ProductCategory,\nProductSubcategory, Product, and SalesOrder. ProductCategory, ProductSubcategory, and Product are used\noften in analytical queries.\nYou need to implement a star schema for DW1. The solution must minimize development effort.\nWhich design approach should you use? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Denormalized into a single product dimension table. In dimensional modeling, especially when designing a star schema, it's common to denormalize hierarchies like Product > Subcategory > Category into one dimension table (e.g., DimProduct). This simplifies relationships, speeds up queries, and is optimal for analytical workloads. Having one dimension (e.g., DimProduct) containing all relevant attributes makes slicing and dicing in reports easier. The unique system generated identifier. The best practice for joining dimension and fact tables is to use a surrogate key or a system-generated unique identifier (such as ProductID). This ensures efficiency, uniqueness, and referential integrity between the fact (SalesOrder) and dimension (Product) tables.","correctText":"Explanation:"},{"prompt":"HOTSPOT\n-\nYour company has three newly created data engineering teams named Team1, Team2, and Team3 that plan to use\nFabric. The teams have the following personas:\n•Team1 consists of members who currently use Microsoft Power BI. The team wants to transform data by using by\na low-code approach.\n•Team2 consists of members that have a background in Python programming. The team wants to use PySpark code\nto transform data.\n•Team3 consists of members who currently use Azure Data Factory. The team wants to move data between source\nand sink environments by using the least amount of effort.\nYou need to recommend tools for the teams based on their current personas.\nWhat should you recommend for each team? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Dataflow Gen2 dataflow. Team1 has selected Dataflow Gen2 dataflow, which refers to Azure Dataflow Gen2, a data transformation tool used in Azure Data Factory. It is suitable for visually designing data transformations at scale using a code-free environment. Notebooks. Team2 has chosen Notebooks, which are typically used in tools like Azure Synapse or Databricks. Notebooks support interactive data analysis, machine learning, and visualizations, written in languages like Python, Scala, or SQL. Data pipelines. Team3 has picked Data pipelines, which are end-to-end workflows that move and transform data across different environments. In Azure, this refers to Azure Data Factory pipelines that help in orchestrating and automating data movement and data transformation tasks.","correctText":"Explanation:"},{"prompt":"HOTSPOT\n-\nYou plan to process the following three datasets by using Fabric:\nDataset1: This dataset will be added to Fabric and will have a unique primary key between the source and the\ndestination. The unique primary key will be an integer and will start from 1 and have an increment of 1.\nDataset2: This dataset contains semi-structured data that uses bulk data transfer. The dataset must be handled in\none process between the source and the destination. The data transformation process will include the use of\ncustom visuals to understand and work with the dataset in development mode.\nDataset3: This dataset is in a lakehouse. The data will be bulk loaded. The data transformation process will include\nrow-based windowing functions during the loading process.\nYou need to identify which type of item to use for the datasets. The solution must minimize development effort and\nuse built-in functionality, when possible.\nWhat should you identify for each dataset? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Dataset1: Dataflow Gen2 dataflow. Dataflow Gen2 is used to ingest, transform, and load (ETL) data using a visual, low-code experience. Pulling in data from various sources (e.g., databases, files) Performing lightweight or medium-complexity transformations Common in Microsoft Fabric and Power BI for reusable, refreshable logic. Dataset2: A notebook. Notebooks support rich, code-driven data processing using languages like PySpark, Scala, or SQL in a Spark environment. You need custom transformation logic You're doing advanced analytics, machine learning, or structured streaming Suitable for big data and complex logic where visual dataflows aren't sufficient. Dataset3: A T-SQL statement. T-SQL (Transact-SQL) is the language for querying SQL-based engines like Azure SQL Database or Lakehouse SQL Endpoints. Querying structured data Creating views or computed tables in a Lakehouse or Warehouse T-SQL statements are highly performant for structured, relational data operations.","correctText":"Explanation:"},{"prompt":"HOTSPOT\n-\nYou have a Fabric workspace that contains a lakehouse named Lakehouse1. Lakehouse1 contains a table named\nStatus_Target that has the following columns:\n•Key\n•Status\n•LastModified\nThe data source contains a table named Status_Source that has the same columns as Status_Target.\nStatus_Source is used to populate Status_Target.\nIn a notebook name Notebook1, you load Status_Source to a DataFrame named sourceDF and Status_Target to a\nDataFrame named targetDF.\nYou need to implement an incremental loading pattern by using Notebook1. The solution must meet the following\nrequirements:\n•For all the matching records that have the same value of key, update the value of LastModified in Status_Target\nto the value of LastModified in Status_Source.\n•Insert all the records that exist in Status_Source that do NOT exist in Status_Target.\n•Set the value of Status in Status_Target to inactive for all the records that were last modified more than seven\ndays ago and that do NOT exist in Status_Source.\nHow should you complete the statement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1. whenMatchedUpdate() Selected for when existing records match between sourceDF and targetDF based on Key. Action: Update the LastModified field in the target table with the one from the source table. python Copy Edit .whenMatchedUpdate( set = \"targetDF.LastModified\": \"sourceDF.LastModified\" ) Meaning: If a record with the same Key exists, update its LastModified value to the new one. 2. whenNotMatchedInsert() Selected for when the record does NOT exist in targetDF. Action: Insert a new record with fields from the sourceDF. python Copy Edit .whenNotMatchedInsert( values = \"targetDF.Key\": \"sourceDF.Key\", \"targetDF.LastModified\": \"sourceDF.LastModified\", \"targetDF.Status\": \"sourceDF.Status\" ) Meaning: If a Key is found in sourceDF but not in targetDF, insert the full new row (Key, LastModified, Status). 3. whenNotMatchedBySourceUpdate() Selected for when a record exists in targetDF but not in sourceDF. Action: Mark the existing record as \"inactive\" if it hasn't been updated recently. python Copy Edit .whenNotMatchedBySourceUpdate( condition = \"targetDF.LastModified > (current_date() - INTERVAL '7' DAY)\", set = \"targetDF.Status\": \"'inactive'\" ) Meaning: If a record is missing from the incoming sourceDF AND it was recently modified (within the last 7 days), set its Status to \"inactive\".","correctText":"Explanation:"},{"prompt":"DRAG DROP\n-\nYou are building a data loading pattern by using a Fabric data pipeline. The source is an Azure SQL database that\ncontains 25 tables. The destination is a lakehouse.\nIn a warehouse, you create a control table named Control.Object as shown in the exhibit. (Click the Exhibit tab.)\nYou need to build a data pipeline that will support the dynamic ingestion of the tables listed in the control table by\nusing a single execution.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of\nactions to the answer area and arrange them in the correct order.","options":[],"explanation":"Add a Lookup activity to query Control.Object and generate a list of the schemas and tables to copy. The Lookup activity is used to retrieve metadata — in this case, information from Control.Object (likely a control table or database containing a list of source schemas and table names). This activity returns a list of tables and schemas that need to be copied. Think of Lookup as fetching a dynamic list. Instead of hardcoding table names, you retrieve them automatically. Add a ForEach activity to iterate over the list of tables and copy the source data to the lakehouse Delta tables. The ForEach activity is used to loop through the list generated by the Lookup activity. For each table/schema combination, you perform operations — in this case, copying data into the lakehouse (into Delta tables, which are optimized tables supporting ACID transactions and fast querying). ForEach loops allow you to automate operations over multiple tables without manually repeating the same logic for each table. Add a Copy data activity as an inner activity to the iterator activity. Inside the ForEach loop, the Copy Data activity will copy the actual data from the source system into the Delta table in the lakehouse. Each table in the list will be copied one by one as the loop runs. This is the main operation that moves the data. Each iteration uses parameters (table name, schema, etc.) from the current item being looped over.","correctText":"Explanation:"},{"prompt":"You are implementing a medallion architecture in a Fabric lakehouse. You plan to create a dimension table that will contain the following columns: •ID •CustomerCode •CustomerName •CustomerAddress •CustomerLocation •ValidFrom •ValidTo You need to ensure that the table supports the analysis of historical sales data by customer location at the time of each sale. Which type of slowly changing dimension (SCD) should you use?","options":["Type 2","Type 0","Type 1","Type 3"],"explanation":"A. Type 2. Type 2 slowly changing dimensions allow you to keep a full history of changes over time. In your case, since the goal is to analyze historical sales data by customer location at the time of each sale, you'll need to preserve every past change to the customer's location. Type 2 achieves this by creating a new row in the dimension table for each change, including the date range for when the record is valid.","correctIndex":0},{"prompt":"You have a Fabric workspace that contains an eventstream named EventStream1. EventStream1 outputs events to a table named Table1 in a lakehouse. The streaming data is sourced from motorway sensors and represents the speed of cars. You need to add a transformation to EventStream1 to average the car speeds. The speeds must be grouped by non- overlapping and contiguous time intervals of one minute. Each event must belong to exactly one window. Which windowing function should you use?","options":["sliding","hopping","tumbling","session"],"explanation":"C. Tumbling. Tumbling windows divide the data stream into fixed, non-overlapping, and contiguous time intervals, such as one-minute windows in this case. Each event belongs to exactly one window, making tumbling windows ideal for calculating averages or other aggregate metrics over defined intervals of time.","correctIndex":2},{"prompt":"HOTSPOT\n-\nYou have a table in a Fabric lakehouse that contains the following data.\nYou have a notebook that contains the following code segment.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Line 01 will replace all the null and empty values in the CustomerName column with the Unknown value. Yes This line describes a data cleaning operation where missing or empty entries in a column are filled with a default value, \"Unknown\". This is a common transformation in tools like Power Query (M Language), SQL, or Python (e.g., fillna(\"Unknown\") in pandas). It is valid and accurate, assuming the syntax is correct. Line 02 will extract the value before the @ character and generate a new column named Username. No This sounds like it's trying to split email addresses into usernames. However, without seeing the actual syntax of Line 02, we cannot assume that it correctly: Splits the string using '@', Extracts the first part, Assigns it to a new column. Often, this mistake happens if the line tries to modify the column in-place or fails to assign a new column. So unless it explicitly creates a new column (e.g., Username = Text.BeforeDelimiter(Email, \"@\")), the claim is inaccurate. Line 03 will extract the year value from the OrderDate column and keep only the first occurrence for each year. No. Extracting the year from a date column is easy and common. However, keeping only the first occurrence for each year suggests some kind of grouping and filtering step. Unless Line 03 explicitly includes logic like Group By Year and selecting the first row, it doesn't do what this statement claims. So this statement assumes extra behavior not guaranteed by merely extracting the year.","correctText":"Explanation:"},{"prompt":"DRAG DROP\n-\nYou have a Fabric workspace that contains an eventhouse named Eventhouse1.\nIn Eventhouse1, you plan to create a table named DeviceStreamData in a KQL database. The table will contain data\nbased on the following sample.\nYou need to use a KQL query to develop the solution for Eventhouse1.\nWhich three code segments should you run in sequence? To answer, move the appropriate code segments from\nthe list of code segments to the answer area and arrange them in the correct order.","options":[],"explanation":"create table EventStreamData ( create table is a KQL management command used to create a new table. EventStreamData is the name of the table being created. The opening parenthesis ( indicates the start of the schema definition. TimeStamp:datetime, DeviceId:string. Defines two columns in the table: TimeStamp:datetime This column will hold the date and time of the event. Essential for time-series analysis and stream processing. DeviceId:string A string identifier for the device sending the event. Used to filter or group events by the device. StreamData:dynamic ) The dynamic data type in KQL is used for semi-structured data, such as JSON. This column is intended to store complex or nested event payloads that vary in structure. The closing parenthesis ) completes the schema declaration.","correctText":"Explanation:"},{"prompt":"You have a Fabric workspace that contains a warehouse named Warehouse1. You have an on-premises Microsoft SQL Server database named Database1 that is accessed by using an on- premises data gateway. You need to copy data from Database1 to Warehouse1. Which item should you use?","options":["a data pipeline","an Apache Spark job definition","a streaming dataflow","a notebook"],"explanation":"A. a data pipeline. A data pipeline is designed to copy and transform data between sources and destinations, such as transferring data from an on-premises Microsoft SQL Server database to a Fabric warehouse like Warehouse1. It can seamlessly leverage the on-premises data gateway for connectivity and ensure efficient movement of data.","correctIndex":0},{"prompt":"You have a Fabric warehouse named DW1 that contains a Type 2 slowly changing dimension (SCD) dimension table named DimCustomer. DimCustomer contains 100 columns and 20 million rows. The columns are of various data types, including int, varchar, date, and varbinary. You need to identify incoming changes to the table and update the records when there is a change. The solution must minimize resource consumption. What should you use to identify changes to attributes?","options":["a hash function to compare the attributes in the source table.","a direct attributes comparison across the attributes in the DimCustomer table.","a direct attributes comparison for the attributes in the source table.","a hash function to compare the attributes in the DimCustomer table."],"explanation":"A. a hash function to compare the attributes in the source table. Using a hash function is an efficient way to identify changes, as it minimizes resource consumption. By generating and comparing hash values for attributes, you can quickly detect differences between the source table and the target table without comparing each attribute directly, which can be resource-intensive.","correctIndex":0},{"prompt":"You have an Azure SQL database named DB1. In a Fabric workspace, you deploy an eventstream named EventStreamDB1 to stream record changes from DB1 into a lakehouse. You discover that events are NOT being propagated to EventStreamDB1. You need to ensure that the events are propagated to EventStreamDB1. What should you do?","options":["Create a read-only replica of DB1.","Create an Azure Stream Analytics job.","Enable Extended Events for DB1.","Enable change data capture (CDC) for DB1."],"explanation":"D: Enable change data capture (CDC) for DB1. Change Data Capture (CDC) is a feature used to track changes (inserts, updates, and deletes) in a database table and make those changes available in a way that they can be consumed by other systems or processes, such as EventStreamDB1. When events are not being propagated, it typically means that the system responsible for capturing changes (in this case, CDC) is not enabled or configured. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question. Overview. Company Overview - Contoso, Ltd. is an online retail company that wants to modernize its analytics platform by moving to Fabric. The company plans to begin using Fabric for marketing analytics. Overview. IT Structure - The company’s IT department has a team of data analysts and a team of data engineers that use analytics systems. The data engineers perform the ingestion, transformation, and loading of data. They prefer to use Python or SQL to transform the data. The data analysts query data and create semantic models and reports. They are qualified to write queries in Power Query and T-SQL. Existing Environment. Fabric - Contoso has an F64 capacity named Cap1. All Fabric users are allowed to create items. Contoso has two workspaces named WorkspaceA and WorkspaceB that currently use Pro license mode. Existing Environment. Source Systems Contoso has a point of sale (POS) system named POS1 that uses an instance of SQL Server on Azure Virtual Machines in the same Microsoft Entra tenant as Fabric. The host virtual machine is on a private virtual network that has public access blocked. POS1 contains all the sales transactions that were processed on the company’s website. The company has a software as a service (SaaS) online marketing app named MAR1. MAR1 has seven entities. The entities contain data that relates to email open rates and interaction rates, as well as website interactions. The data can be exported from MAR1 by calling REST APIs. Each entity has a different endpoint. Contoso has been using MAR1 for one year. Data from prior years is stored in Parquet files in an Amazon Simple Storage Service (Amazon S3) bucket. There are 12 files that range in size from 300 MB to 900 MB and relate to email interactions. Existing Environment. Product Data POS1 contains a product list and related data. The data comes from the following three tables: •Products •ProductCategories •ProductSubcategories In the data, products are related to product subcategories, and subcategories are related to product categories. Existing Environment. Azure - Contoso has a Microsoft Entra tenant that has the following mail-enabled security groups: •DataAnalysts: Contains the data analysts •DataEngineers: Contains the data engineers Contoso has an Azure subscription. The company has an existing Azure DevOps organization and creates a new project for repositories that relate to Fabric. Existing Environment. User Problems The VP of marketing at Contoso requires analysis on the effectiveness of different types of email content. It typically takes a week to manually compile and analyze the data. Contoso wants to reduce the time to less than one day by using Fabric. The data engineering team has successfully exported data from MAR1. The team experiences transient connectivity errors, which causes the data exports to fail. Requirements. Planned Changes - Contoso plans to create the following two lakehouses: •Lakehouse1: Will store both raw and cleansed data from the sources •Lakehouse2: Will serve data in a dimensional model to users for analytical queries Additional items will be added to facilitate data ingestion and transformation. Contoso plans to use Azure Repos for source control in Fabric. Requirements. Technical Requirements The new lakehouses must follow a medallion architecture by using the following three layers: bronze, silver, and gold. There will be extensive data cleansing required to populate the MAR1 data in the silver layer, including deduplication, the handling of missing values, and the standardizing of capitalization. Each layer must be fully populated before moving on to the next layer. If any step in populating the lakehouses fails, an email must be sent to the data engineers. Data imports must run simultaneously, when possible. The use of email data from the Amazon S3 bucket must meet the following requirements: •Minimize egress costs associated with cross-cloud data access. •Prevent saving a copy of the raw data in the lakehouses. Items that relate to data ingestion must meet the following requirements: •The items must be source controlled alongside other workspace items. •Ingested data must land in the bronze layer of Lakehouse1 in the Delta format. •No changes other than changes to the file formats must be implemented before the data lands in the bronze layer. •Development effort must be minimized and a built-in connection must be used to import the source data. •In the event of a connectivity error, the ingestion processes must attempt the connection again. Lakehouses, data pipelines, and notebooks must be stored in WorkspaceA. Semantic models, reports, and dataflows must be stored in WorkspaceB. Once a week, old files that are no longer referenced by a Delta table log must be removed. Requirements. Data Transformation In the POS1 product data, ProductID values are unique. The product dimension in the gold layer must include only active products from product list. Active products are identified by an IsActive value of 1. Some product categories and subcategories are NOT assigned to any product. They are NOT analytically relevant and must be omitted from the product dimension in the gold layer. Requirements. Data Security - Security in Fabric must meet the following requirements: •The data engineers must have read and write access to all the lakehouses, including the underlying files. •The data analysts must only have read access to the Delta tables in the gold layer. •The data analysts must NOT have access to the data in the bronze and silver layers. •The data engineers must be able to commit changes to source control in WorkspaceA.","correctIndex":3},{"prompt":"You need to recommend a solution to resolve the MAR1 connectivity issues. The solution must minimize development effort. What should you recommend?","options":["Add a ForEach activity to the data pipeline.","Configure retries for the Copy data activity.","Call a notebook from the data pipeline.","Configure Fault tolerance for the Copy data activity."],"explanation":"B. Configure retries for the Copy data activity. Configuring retries for the Copy data activity is a straightforward solution that minimizes development effort while addressing connectivity issues. By enabling retries, the pipeline can automatically attempt to reconnect and complete the operation without requiring additional complex configurations or manual intervention. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use
