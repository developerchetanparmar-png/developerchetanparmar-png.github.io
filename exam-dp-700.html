  <script type="application/json" id="embedded-exam-payload" data-exam-slug="dp-700">{"id":"dp-700","title":"DP-700","examName":"Implementing Data Engineering Solutions Using Microsoft Fabric","sourceNote":"Parsed from DP-700 practice PDF; wording may differ slightly from Microsoft’s live exam.","questions":[{"prompt":"Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question. Overview. Company Overview - Contoso, Ltd. is an online retail company that wants to modernize its analytics platform by moving to Fabric. The company plans to begin using Fabric for marketing analytics. Overview. IT Structure - The company’s IT department has a team of data analysts and a team of data engineers that use analytics systems. The data engineers perform the ingestion, transformation, and loading of data. They prefer to use Python or SQL to transform the data. The data analysts query data and create semantic models and reports. They are qualified to write queries in Power Query and T-SQL. Existing Environment. Fabric - Contoso has an F64 capacity named Cap1. All Fabric users are allowed to create items. Contoso has two workspaces named WorkspaceA and WorkspaceB that currently use Pro license mode. Existing Environment. Source Systems Contoso has a point of sale (POS) system named POS1 that uses an instance of SQL Server on Azure Virtual Machines in the same Microsoft Entra tenant as Fabric. The host virtual machine is on a private virtual network that has public access blocked. POS1 contains all the sales transactions that were processed on the company’s website. The company has a software as a service (SaaS) online marketing app named MAR1. MAR1 has seven entities. The entities contain data that relates to email open rates and interaction rates, as well as website interactions. The data can be exported from MAR1 by calling REST APIs. Each entity has a different endpoint. Contoso has been using MAR1 for one year. Data from prior years is stored in Parquet files in an Amazon Simple Storage Service (Amazon S3) bucket. There are 12 files that range in size from 300 MB to 900 MB and relate to email interactions. Existing Environment. Product Data POS1 contains a product list and related data. The data comes from the following three tables: Products - ProductCategories - ProductSubcategories - In the data, products are related to product subcategories, and subcategories are related to product categories. Existing Environment. Azure - Contoso has a Microsoft Entra tenant that has the following mail-enabled security groups: DataAnalysts: Contains the data analysts DataEngineers: Contains the data engineers Contoso has an Azure subscription. The company has an existing Azure DevOps organization and creates a new project for repositories that relate to Fabric. Existing Environment. User Problems The VP of marketing at Contoso requires analysis on the effectiveness of different types of email content. It typically takes a week to manually compile and analyze the data. Contoso wants to reduce the time to less than one day by using Fabric. The data engineering team has successfully exported data from MAR1. The team experiences transient connectivity errors, which causes the data exports to fail. Requirements. Planned Changes - Contoso plans to create the following two lakehouses: Lakehouse1: Will store both raw and cleansed data from the sources Lakehouse2: Will serve data in a dimensional model to users for analytical queries Additional items will be added to facilitate data ingestion and transformation. Contoso plans to use Azure Repos for source control in Fabric. Requirements. Technical Requirements The new lakehouses must follow a medallion architecture by using the following three layers: bronze, silver, and gold. There will be extensive data cleansing required to populate the MAR1 data in the silver layer, including deduplication, the handling of missing values, and the standardizing of capitalization. Each layer must be fully populated before moving on to the next layer. If any step in populating the lakehouses fails, an email must be sent to the data engineers. Data imports must run simultaneously, when possible. The use of email data from the Amazon S3 bucket must meet the following requirements: Minimize egress costs associated with cross-cloud data access. Prevent saving a copy of the raw data in the lakehouses. Items that relate to data ingestion must meet the following requirements: The items must be source controlled alongside other workspace items. Ingested data must land in the bronze layer of Lakehouse1 in the Delta format. No changes other than changes to the file formats must be implemented before the data lands in the bronze layer. Development effort must be minimized and a built-in connection must be used to import the source data. In the event of a connectivity error, the ingestion processes must attempt the connection again. Lakehouses, data pipelines, and notebooks must be stored in WorkspaceA. Semantic models, reports, and dataflows must be stored in WorkspaceB. Once a week, old files that are no longer referenced by a Delta table log must be removed. Requirements. Data Transformation In the POS1 product data, ProductID values are unique. The product dimension in the gold layer must include only active products from product list. Active products are identified by an IsActive value of 1. Some product categories and subcategories are NOT assigned to any product. They are NOT analytically relevant and must be omitted from the product dimension in the gold layer. Requirements. Data Security - Security in Fabric must meet the following requirements: The data engineers must have read and write access to all the lakehouses, including the underlying files. The data analysts must only have read access to the Delta tables in the gold layer. The data analysts must NOT have access to the data in the bronze and silver layers. The data engineers must be able to commit changes to source control in WorkspaceA. You need to ensure that the data analysts can access the gold layer lakehouse. What should you do?","options":["Add the DataAnalyst group to the Viewer role for WorkspaceA.","Share the lakehouse with the DataAnalysts group and grant the Build reports on the default semantic model permission.","Share the lakehouse with the DataAnalysts group and grant the Read all SQL Endpoint data permission.","Share the lakehouse with the DataAnalysts group and grant the Read all Apache Spark permission."],"explanation":"C: Share the lakehouse with the DataAnalysts group and grant the Read all data permission.This approach ensures that data analysts have the necessary read access to the Delta tables in the gold layer, aligning with the requirement that they should not have access to data in the bronze and silver layers. By granting Read all SQL Endpoint data permission, the analysts get the necessary and sufficient access to query the gold layer data while adhering to the principle of least privilege.","correctIndex":2},{"prompt":"You have a Fabric workspace. You have semi-structured data. You need to read the data by using T-SQL, KQL, and Apache Spark. The data will only be written by using Spark. What should you use to store the data?","options":["a lakehouse","an eventhouse","a datamart","a warehouse"],"explanation":"B. an eventhouse . an eventhouse suggests the focus is on storing event-based or streaming data. While the data itself is semi- structured and written using Apache Spark, the choice of an eventhouse aligns with scenarios where real-time ingestion and analysis of data streams are required. Additionally, an eventhouse is optimized for applications handling high-frequency data events, making it suitable for Spark-based write operations and enabling the integration of T-SQL, KQL, and Spark query capabilities.","correctIndex":1},{"prompt":"You have a Fabric workspace that contains a warehouse named Warehouse1. You have an on-premises Microsoft SQL Server database named Database1 that is accessed by using an on- premises data gateway. You need to copy data from Database1 to Warehouse1. Which item should you use?","options":["a Dataflow Gen1 dataflow","a data pipeline","a KQL queryset","a notebook"],"explanation":"B: a data pipeline. A data pipeline is the most suitable tool for moving data between different sources and destinations. In this case, you need to copy data from your on-premises Microsoft SQL Server database (Database1) to your Fabric warehouse (Warehouse1). A data pipeline can efficiently handle this task by allowing you to define and manage the data transfer process.","correctIndex":1},{"prompt":"You have a Fabric workspace that contains a warehouse named Warehouse1. You have an on-premises Microsoft SQL Server database named Database1 that is accessed by using an on- premises data gateway. You need to copy data from Database1 to Warehouse1. Which item should you use?","options":["an Apache Spark job definition","a data pipeline","a Dataflow Gen1 dataflow","an eventstream"],"explanation":"B: a data pipeline. A data pipeline is specifically designed for orchestrating and automating data movement tasks between different sources and destinations. Here’s why a data pipeline is the best choice for copying data from your on-premises Microsoft SQL Server database (Database1) to your Fabric warehouse (Warehouse1) Data pipelines in Microsoft Fabric are designed to facilitate the movement and transformation of data between various sources and destinations. In this scenario, a data pipeline can be configured to copy data from the on-premises SQL Server database to the Fabric warehouse, utilizing the on-premises data gateway for secure connectivity.","correctIndex":1},{"prompt":"You have a Fabric F32 capacity that contains a workspace. The workspace contains a warehouse named DW1 that is modelled by using MD5 hash surrogate keys. DW1 contains a single fact table that has grown from 200 million rows to 500 million rows during the past year. You have Microsoft Power BI reports that are based on Direct Lake. The reports show year-over-year values. Users report that the performance of some of the reports has degraded over time and some visuals show errors. You need to resolve the performance issues. The solution must meet the following requirements: Provide the best query performance. Minimize operational costs. Which should you do?","options":["Change the MD5 hash to SHA256.","Increase the capacity.","Enable V-Order.","Modify the surrogate keys to use a different data type.","Create views."],"explanation":"C. Enable V-Order. V-Order is a feature that optimizes query performance by enabling faster data retrieval, especially for large datasets. It organizes the data in a compressed format that improves storage efficiency and query speed, which directly addresses the issue of degraded performance in reports. Additionally, enabling V-Order minimizes operational costs because it reduces the amount of storage used and accelerates query execution, avoiding the need for expensive resource scaling (like increasing capacity).","correctIndex":2},{"prompt":"HOTSPOT -\nYou have a Fabric workspace that contains a warehouse named DW1. DW1 contains the following tables and\ncolumns.\nYou need to create an output that presents the summarized values of all the order quantities by year and product.\nThe results must include a summary of the order quantities at the year level for all the products.\nHow should you complete the code? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Key Details: The use of ROLLUP ensures compliance with the requirement for summarized values at different grouping levels. SUM(SO.OrderQty) calculates the total order quantities.","correctText":"Box1 -> SELECT YEAR || Box2 -> ROLLUP(YEAR(SO.ModifiedDATE), P.Name)"},{"prompt":"You have a Fabric workspace that contains a lakehouse named Lakehouse1. Data is ingested into Lakehouse1 as one flat table. The table contains the following columns. You plan to load the data into a dimensional model and implement a star schema. From the original flat table, you create two tables named FactSales and DimProduct. You will track changes in DimProduct. You need to prepare the data. Which three columns should you include in the DimProduct table? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Date","ProductName","ProductColor","TransactionID","SalesAmount","ProductID"],"explanation":"B. ProductName: This attribute describes the product and is crucial for understanding and analyzing the data related to each product. C. ProductColor: This attribute provides additional information about the product, which can be useful for analysis, reporting, and segmentation. F. ProductID: This is the unique identifier for each product and serves as the primary key for the DimProduct table. It's essential for establishing the relationship between the FactSales table and the DimProduct table.","correctText":"BCF"},{"prompt":"You have a Fabric workspace named Workspace1 that contains a notebook named Notebook1. In Workspace1, you create a new notebook named Notebook2. You need to ensure that you can attach Notebook2 to the same Apache Spark session as Notebook1. What should you do?","options":["Enable high concurrency for notebooks.","Enable dynamic allocation for the Spark pool.","Change the runtime version.","Increase the number of executors."],"explanation":"A.Enable high concurrency for notebooks : High concurrency allows multiple notebooks to share the same Apache Spark session. This setting ensures that different notebooks can run simultaneously within the same session, facilitating collaboration and efficient resource usage.","correctIndex":0},{"prompt":"You have a Fabric workspace named Workspace1 that contains a lakehouse named Lakehouse1. Lakehouse1 contains the following tables: Orders - Customer - Employee - The Employee table contains Personally Identifiable Information (PII). A data engineer is building a workflow that requires writing data to the Customer table, however, the user does NOT have the elevated permissions required to view the contents of the Employee table. You need to ensure that the data engineer can write data to the Customer table without reading data from the Employee table. Which three actions should you perform? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Share Lakehouse1 with the data engineer.","Assign the data engineer the Contributor role for Workspace2.","Assign the data engineer the Viewer role for Workspace2.","Assign the data engineer the Contributor role for Workspace1.","Migrate the Employee table from Lakehouse1 to Lakehouse2.","Create a new workspace named Workspace2 that contains a new lakehouse named Lakehouse2.","Assign the data engineer the Viewer role for Workspace1."],"explanation":"D. Assign the data engineer the Contributor role for Workspace1: Assigning the Contributor role to the data engineer for Workspace1 grants them the necessary permissions to write data to the Customer table in Lakehouse1. However, since the data engineer does not have elevated permissions to view the Employee table, they won't be able to access its content. E. Migrate the Employee table from Lakehouse1 to Lakehouse2: Moving the Employee table, which contains Personally Identifiable Information (PII), to a separate Lakehouse2 helps ensure that the data engineer cannot accidentally or intentionally access it. This action keeps sensitive data segregated from the data engineer's operational environment. F. Create a new workspace named Workspace2 that contains a new lakehouse named Lakehouse2: By creating a new workspace and lakehouse for the Employee table, you further isolate the sensitive data. The data engineer can still perform their tasks in Workspace1 without accessing Workspace2, ensuring secure data handling and compliance with privacy requirements.","correctText":"DEF"},{"prompt":"You have a Fabric warehouse named DW1. DW1 contains a table that stores sales data and is used by multiple sales representatives. You plan to implement row-level security (RLS). You need to ensure that the sales representatives can see only their respective data. Which warehouse object do you require to implement RLS?","options":["STORED PROCEDURE","CONSTRAINT","SCHEMA","FUNCTION"],"explanation":"To implement Row-Level Security (RLS) in a Fabric warehouse like DW1, need to use a FUNCTION to define the filtering logic. Specifically, a user-defined function (UDF) is created and associated with the RLS policy to determine which rows each user can access. Reference: https://learn.microsoft.com/en-us/fabric/data-warehouse/tutorial-row-level-security#2-define-security- policies","correctIndex":3},{"prompt":"HOTSPOT -\nYou have a Fabric workspace named Workspace1_DEV that contains the following items:\n10 reports\nFour notebooks -\nThree lakehouses -\nTwo data pipelines -\nTwo Dataflow Gen1 dataflows -\nThree Dataflow Gen2 dataflows -\nFive semantic models that each has a scheduled refresh policy\nYou create a deployment pipeline named Pipeline1 to move items from Workspace1_DEV to a new workspace\nnamed Workspace1_TEST.\n\nYou deploy all the items from Workspace1_DEV to Workspace1_TEST.\nFor each of the following statements, select Yes if the statement is true. Otherwise, select No.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1. Data from the semantic models will be deployed to the target stage. (Sub-choice: No) Semantic models are only deployed to the target stage in the form of metadata . The deployment process does not copy actual data; instead, only the structural and configuration metadata (e.g., model schema and measures) is deployed. The target stage will require a refresh to fetch the data into the semantic models. Reference : Microsoft Learn - Item Properties Copied During Deployment 2.The Dataflow Gen1 dataflows will be deployed to the target stage. (Sub-choice: Yes) Dataflow Gen1 objects are included in the deployment pipeline and are fully deployed to the target stage, including their configurations. This ensures that Dataflow Gen1 pipelines can run in the target environment. The deployment process supports this functionality without requiring a manual configuration. 3.The scheduled refresh policies will be deployed to the target stage. (Sub-choice: No) The deployment process does not copy or deploy refresh schedules for datasets, semantic models, or other items. Although metadata for the items is deployed, refresh schedules must be manually recreated or configured in the target stage. This limitation is highlighted in Microsoft's documentation. Reference : Microsoft Learn - Item Properties Copied During Deployment","correctText":"No/Yes/No"},{"prompt":"You have a Fabric deployment pipeline that uses three workspaces named Dev, Test, and Prod. You need to deploy an eventhouse as part of the deployment process. What should you use to add the eventhouse to the deployment process?","options":["GitHub Actions","a deployment pipeline","an Azure DevOps pipeline"],"explanation":"B. a deployment pipeline. Deployment Pipeline: In Microsoft Fabric, a deployment pipeline is specifically designed for managing and deploying resources across different environments (Dev, Test, and Prod). It allows you to automate the deployment process, ensuring consistency and efficiency. By using a deployment pipeline, you can easily include the eventhouse in your deployment process and manage its promotion through the different stages (Dev, Test, Prod). Reference: https://learn.microsoft.com/en-us/fabric/cicd/deployment-pipelines/get-started-with-deployment-pipelines? tabs=from-fabric%2Cnew%2Cstage-settings-new https://learn.microsoft.com/en-us/fabric/cicd/deployment-pipelines/understand-the-deployment-process? tabs=new","correctIndex":1},{"prompt":"You have a Fabric workspace named Workspace1 that contains a warehouse named Warehouse1. You plan to deploy Warehouse1 to a new workspace named Workspace2. As part of the deployment process, you need to verify whether Warehouse1 contains invalid references. The solution must minimize development effort. What should you use?","options":["a database project","a deployment pipeline","a Python script","a T-SQL script"],"explanation":"Explanation: Microsoft Fabric's deployment pipelines provide a built-in mechanism to manage and validate the deployment of artifacts like warehouses. When you use a deployment pipeline to move Warehouse1 from one workspace (Workspace1) to another (Workspace2), the pipeline automatically checks for issues such as invalid references or missing dependencies during the deployment process.","correctIndex":1},{"prompt":"You have a Fabric workspace that contains a Real-Time Intelligence solution and an eventhouse. Users report that from OneLake file explorer, they cannot see the data from the eventhouse. You enable OneLake availability for the eventhouse. What will be copied to OneLake?","options":["only data added to new databases that are added to the eventhouse","only the existing data in the eventhouse","no data","both new data and existing data in the eventhouse","only new data added to the eventhouse"],"explanation":"D. both new data and existing data in the eventhouse. When you enable OneLake availability for the eventhouse, all existing data in the eventhouse is copied to OneLake, ensuring that users have access to historical data. Additionally, any new data added to the eventhouse after enabling OneLake availability will also be synchronized and accessible through OneLake. This ensures seamless integration of past and future data for users leveraging OneLake file explorer.","correctIndex":3},{"prompt":"You have a Fabric workspace named Workspace1. You plan to integrate Workspace1 with Azure DevOps. You will use a Fabric deployment pipeline named deployPipeline1 to deploy items from Workspace1 to higher environment workspaces as part of a medallion architecture. You will run deployPipeline1 by using an API call from an Azure DevOps pipeline. You need to configure API authentication between Azure DevOps and Fabric. Which type of authentication should you use?","options":["service principal","Microsoft Entra username and password","managed private endpoint","workspace identity"],"explanation":"A. service principal. Service Principal: A service principal is a security identity used by applications, services, and automation tools to access specific Azure resources. It provides a secure way to authenticate and authorize API calls between Azure DevOps and Fabric. By using a service principal, you can grant the necessary permissions to deployPipeline1 to interact with the Fabric workspace (Workspace1) and deploy items to higher environments. This approach ensures secure and managed access without relying on individual user credentials.","correctIndex":0},{"prompt":"You have a Google Cloud Storage (GCS) container named storage1 that contains the files shown in the following table. You have a Fabric workspace named Workspace1 that has the cache for shortcuts enabled. Workspace1 contains a lakehouse named Lakehouse1. Lakehouse1 has the shortcuts shown in the following table. You need to read data from all the shortcuts. Which shortcuts will retrieve data from the cache?","options":["Stores only","Products only","Stores and Products only","Products, Stores, and Trips","Trips only","Products and Trips only"],"explanation":"C. Stores and Products only. When the cache for shortcuts is enabled in a Fabric workspace, it allows for faster access to the data by caching the files locally. However, the effectiveness of this caching depends on whether the cache was enabled before the files were added to the storage or if the shortcuts were already pointing to those files.","correctIndex":2},{"prompt":"You have a Fabric workspace named Workspace1 that contains an Apache Spark job definition named Job1. You have an Azure SQL database named Source1 that has public internet access disabled. You need to ensure that Job1 can access the data in Source1. What should you create?","options":["an on-premises data gateway","a managed private endpoint","an integration runtime","a data management gateway"],"explanation":"B. a managed private endpoint. Managed Private Endpoint: This allows secure and private communication between Azure services without exposing data to the public internet. By creating a managed private endpoint, you can establish a direct connection between the Apache Spark job in Workspace1 and the Azure SQL database (Source1) while keeping public internet access disabled. This approach ensures that data transfer happens securely within the Azure network. To ensure that Job1 can access the data in Source1, you need to create a managed private endpoint. This will allow the Spark job to securely connect to the Azure SQL database without requiring public internet access.","correctIndex":1},{"prompt":"You have an Azure Data Lake Storage Gen2 account named storage1 and an Amazon S3 bucket named storage2. You have the Delta Parquet files shown in the following table. You have a Fabric workspace named Workspace1 that has the cache for shortcuts enabled. Workspace1 contains a lakehouse named Lakehouse1. Lakehouse1 has the following shortcuts: A shortcut to ProductFile aliased as Products A shortcut to StoreFile aliased as Stores A shortcut to TripsFile aliased as Trips The data from which shortcuts will be retrieved from the cache?","options":["Trips and Stores only","Products and Store only","Stores only","Products only","Products, Stores, and Trips"],"explanation":"B. Products and Stores only. When the cache for shortcuts is enabled in a Fabric workspace, it allows for faster access to the data by caching the files locally. This means that data accessed through the cached shortcuts is retrieved from the local cache instead of the original storage locations, which improves performance. Reference: https://learn.microsoft.com/en-us/fabric/onelake/onelake-shortcuts","correctIndex":1},{"prompt":"HOTSPOT -\nYou have a Fabric workspace named Workspace1 that contains the items shown in the following table.\nFor Model1, the Keep your Direct Lake data up to date option is disabled.\nYou need to configure the execution of the items to meet the following requirements:\nNotebook1 must execute every weekday at 8:00 AM.\nNotebook2 must execute when a file is saved to an Azure Blob Storage container.\nModel1 must refresh when Notebook1 has executed successfully.\nHow should you orchestrate each item? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"correctText":"Box1 ->2 || Box2 -> 3 || Box3 -> 2 || Box4 -> 1"},{"prompt":"Your company has a sales department that uses two Fabric workspaces named Workspace1 and Workspace2. The company decides to implement a domain strategy to organize the workspaces. You need to ensure that a user can perform the following tasks: Create a new domain for the sales department. Create two subdomains: one for the east region and one for the west region. Assign Workspace1 to the east region subdomain. Assign Workspace2 to the west region subdomain. The solution must follow the principle of least privilege. Which role should you assign to the user?","options":["workspace Admin","domain admin","domain contributor","Fabric admin"],"explanation":"Fabric Admin : Possesses the highest level of permissions within the Fabric environment, enabling the creation of domains and subdomains, as well as the assignment of resources to those subdomains.","correctIndex":3},{"prompt":"You have a Fabric workspace named Workspace1 that contains a warehouse named DW1 and a data pipeline named Pipeline1. You plan to add a user named User3 to Workspace1. You need to ensure that User3 can perform the following actions: View all the items in Workspace1. Update the tables in DW1. The solution must follow the principle of least privilege. You already assigned the appropriate object-level permissions to DW1. Which workspace role should you assign to User3?","options":["Admin","Member","Viewer","Contributor"],"explanation":"Member: This role allows users to view and interact with all the items in the workspace. When combined with the already assigned object-level permissions to DW1, it ensures that User3 can update the tables in DW1.","correctIndex":1},{"prompt":"You have a Fabric capacity that contains a workspace named Workspace1. Workspace1 contains a lakehouse named Lakehouse1, a data pipeline, a notebook, and several Microsoft Power BI reports. A user named User1 wants to use SQL to analyze the data in Lakehouse1. You need to configure access for User1. The solution must meet the following requirements: Provide User1 with read access to the table data in Lakehouse1. Prevent User1 from using Apache Spark to query the underlying files in Lakehouse1. Prevent User1 from accessing other items in Workspace1. What should you do?","options":["Share Lakehouse1 with User1 directly and select Read all SQL endpoint data.","Assign User1 the Viewer role for Workspace1. Share Lakehouse1 with User1 and select Read all SQL endpoint data.","Share Lakehouse1 with User1 directly and select Build reports on the default semantic model.","Assign User1 the Member role for Workspace1. Share Lakehouse1 with User1 and select Read all SQL endpoint data."],"explanation":"A. Share Lakehouse1 with User1 directly and select Read all SQL endpoint data. Share Lakehouse1 with User1 directly and select Read all SQL endpoint data : This approach grants User1 read access specifically to the table data in Lakehouse1 through the SQL endpoint, without giving them broader permissions in Workspace1 or access to other items. By directly sharing Lakehouse1 and selecting the \"Read all SQL endpoint data\" option, you ensure User1 can use SQL to analyze the data while preventing them from using Apache Spark to query the underlying files.","correctIndex":0},{"prompt":"DRAG DROP -\nYou are implementing the following data entities in a Fabric environment:\nEntity1: Available in a lakehouse and contains data that will be used as a core organization entity\nEntity2: Available in a semantic model and contains data that meets organizational standards\nEntity3: Available in a Microsoft Power BI report and contains data that is ready for sharing and reuse\nEntity4: Available in a Power BI dashboard and contains approved data for executive-level decision making\nYour company requires that specific governance processes be implemented for the data.\nYou need to apply endorsement badges to the entities based on each entity’s use case.\nWhich badge should you apply to each entity? To answer, drag the appropriate badges the correct entities. Each\nbadge may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll\nto view content.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"1. Master Data. Refers to authoritative data that is central to business operations, often stored in a master data management system. This is typically well-maintained and used across multiple departments. Assigned to Entity1, as it represents centralized and validated business data. 2. Certified. Indicates that an entity (such as a dataset or report) is officially validated by an authority in the organization. Typically used for trusted and critical business data. Assigned to Entity2 because this entity meets the highest quality standards. 3. Promoted. Indicates that an entity is recommended for use but is not fully certified. This badge is usually given when an item is considered useful but has not gone through a formal approval process. Assigned to Entity3, which signifies that it is endorsed for use but not yet fully certified. 4. Cannot be Endorsed. Indicates that an entity does not qualify for endorsement (either promoted or certified). This could be due to low-quality data, lack of validation, or experimental datasets. Assigned to Entity4, meaning it has not met the standards for endorsement.","correctText":"Explanation:"},{"prompt":"HOTSPOT -\nYou have three users named User1, User2, and User3.\nYou have the Fabric workspaces shown in the following table.\nYou have a security group un deployPipeline1 without modifying the items in Workspace2."],"explanation":"D. Run deployPipeline1 without modifying the items in Workspace2. When items in Workspace1 and Workspace2 are paired and you run the deployment pipeline (deployPipeline1), the pipeline will automatically update the paired items in Workspace2 with the changes made in Workspace1. This means that the modifications in Workspace1 will overwrite the corresponding items in Workspace2 without requiring any additional steps.","correctIndex":3},{"prompt":"You have a Fabric workspace named Workspace1 that contains a data pipeline named Pipeline1 and a lakehouse named Lakehouse1. You have a deployment pipeline named deployPipeline1 that deploys Workspace1 to Workspace2. You restructure Workspace1 by adding a folder named Folder1 and moving Pipeline1 to Folder1. You use deployPipeline1 to deploy Workspace1 to Workspace2. What occurs to Workspace2?","options":["Folder1 is created, Pipeline1 moves to Folder1, and Lakehouse1 is deployed.","Only Pipeline1 and Lakehouse1 are deployed.","Folder1 is created, and Pipeline1 and Lakehouse1 move to Folder1.","Only Folder1 is created and Pipeline1 moves to Folder1."],"explanation":"A. Folder1 is created, Pipeline1 moves to Folder1, and Lakehouse1 is deployed. Folder1 is created: The deployment pipeline will replicate the structure of Workspace1 in Workspace2, including the creation of Folder1. Pipeline1 moves to Folder1: Since Pipeline1 was moved to Folder1 in Workspace1, it will be deployed to Folder1 in Workspace2. Lakehouse1 is deployed: Lakehouse1 is part of Workspace1 and will be deployed to Workspace2 as part of the deployment process.","correctIndex":0},{"prompt":"DRAG DROP -\nYour company has a team of developers. The team creates Python libraries of reusable code that is used to\ntransform data.\nYou create a Fabric workspace name Workspace1 that will be used to develop extract, transform, and load (ETL)\nsolutions by using notebooks.\nYou need to ensure that the libraries are available by default to new notebooks in Workspace1.\nWhich three actions should you perform in sequence? To answer, move the appropriate actions from the list of\nactions to the answer area and arrange them in the correct order.","options":[],"explanation":"Create an environment: Matches with \"Create an environment.\" This action involves defining an environment where libraries, dependencies, and configurations are managed. Install the libraries :Matches with \"Install the libraries.\" Installing libraries involves setting up necessary packages required for development and execution. Set the default environment : Matches with \"Set the default environment.\" This action defines a specific environment as the default for execution.","correctText":"Explanation:"},{"prompt":"You have a Fabric workspace that contains a lakehouse and a notebook named Notebook1. Notebook1 reads data into a DataFrame from a table named Table1 and applies transformation logic. The data from the DataFrame is then written to a new Delta table named Table2 by using a merge operation. You need to consolidate the underlying Parquet files in Table1. Which command should you run?","options":["VACUUM","BROADCAST","OPTIMIZE","CACHE"],"explanation":"OPTIMIZE : This command is used to compact small files into larger ones and optimize the layout of data in a Delta table. By running the OPTIMIZE command on Table1, you can consolidate the Parquet files and improve the performance of read and write operations on the table. To consolidate the underlying Parquet files in Table1, you should run the OPTIMIZE command.","correctIndex":2},{"prompt":"You have five Fabric workspaces. You are monitoring the execution of items by using Monitoring hub. You need to identify in which workspace a specific item runs. Which column should you view in Monitoring hub?","options":["Start time","Capacity","Activity name","Submitter","Item type","Job type","Location"],"explanation":"The Location shows t t with the KQL database. The correct KQL query would use filter, sort by, and project as shown in previous examples. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question. Overview - Litware, Inc. is a publishing company that has an online bookstore and several retail bookstores worldwide. Litware also manages an online advertising business for the authors it represents. Existing Environment. Fabric Environment Litware has a Fabric workspace named Workspace1. High concurrency is enabled for Workspace1. The company has a data engineering team that uses Python for data processing. Existing Environment. Data Processing The retail bookstores send sales data at the end of each business day, while the online bookstore constantly provides logs and sales data to a central enterprise resource planning (ERP) system. Litware implements a medallion architecture by using the following three layers: bronze, silver, and gold. The sales data is ingested from the ERP system as Parquet files that land in the Files folder in a lakehouse. Notebooks are used to transform the files in a Delta table for the bronze and silver layers. The gold layer is in a warehouse that has V-Order disabled. Litware has image files of book covers in Azure Blob Storage. The files are loaded into the Files folder. Existing Environment. Sales Data Month-end sales data is processed on the first calendar day of each month. Data that is older than one month never changes. In the source system, the sales data refreshes every six hours starting at midnight each day. The sales data is captured in a Dataflow Gen1 dataflow. When the dataflow runs, new and historical data is captured. The dataflow captures the following fields of the source: •Sales Date •Author •Price •Units •SKU A table named AuthorSales stores the sales data that relates to each author. The table contains a column named AuthorEmail. Authors authenticate to a guest Fabric tenant by using their email address. Existing Environment. Security Groups Litware has the following security groups: •Sales •Fabric Admins •Streaming Admins Existing Environment. Performance Issues Business users perform ad-hoc queries against the warehouse. The business users indicate that reports against the warehouse sometimes run for two hours and fail to load as expected. Upon further investigation, the data engineering team receives the following error message when the reports fail to load: “The SQL query failed while running.” The data engineering team wants to debug the issue and find queries that cause more than one failure. When the authors have new book releases, there is often an increase in sales activity. This increase slows the data ingestion process. The company’s sales team reports that during the last month, the sales data has NOT been up-to-date when they arrive at work in the morning. Requirements. Planned Changes - Litware recently signed a contract to receive book reviews. The provider of the reviews exposes the data in Amazon Simple Storage Service (Amazon S3) buckets. Litware plans to manage Search Engine Optimization (SEO) for the authors. The SEO data will be streamed from a REST API. Requirements. Version Control - Litware plans to implement a version control solution in Fabric that will use GitHub integration and follow the principle of least privilege. Requirements. Governance Requirements To control data platform costs, the data platform must use only Fabric services and items. Additional Azure resources must NOT be provisioned. Requirements. Data Requirements - Litware identifies the following data requirements: •Process the SEO data in near-real-time (NRT). •Make the book reviews available in the lakehouse without making a copy of the data. •When a new book cover image arrives in the Files folder, process the image as soon as possible.","correctIndex":1},{"prompt":"You need to ensure that processes for the bronze and silver layers run in isolation. How should you configure the Apache Spark settings?","options":["Disable high concurrency.","Create a custom pool.","Modify the number of executors.","Set the default environment."],"explanation":"B. Create a custom pool. While disabling high concurrency (Option A) might seem like it isolates processes, it's not the recommended approach for managing isolation in layered architectures like bronze and silver. By creating a custom pool (Option B), you can allocate dedicated resources to each layer, ensuring they run independently without interfering with one another. Custom pools give you fine-grained control over resource allocation, making them the ideal solution for this scenario.","correctIndex":1},{"prompt":"DRAG DROP\n-\nCase Study\n-\nThis is a case study. Case studies are not timed separately. You can use as much exam time as you would like to\ncomplete each case. However, there may be additional case studies and sections on this exam. You must manage\nyour time to ensure that you are able to complete all questions included on this exam in the time provided.\nTo answer the questions included in a case study, you will need to reference information that is provided in the\ncase study. Case studies might contain exhibits and other resources that provide more information about the\nscenario that is described in the case study. Each question is independent of the other questions in this case study.\nAt the end of this case study, a review screen will appear. This screen allows you to review your answers and to\nmake changes before you move to the next section of the exam. After you begin a new section, you cannot return\nto this section.\nTo start the case study\n-\nTo display the first question in this case study, click the Next button. Use the buttons in the left pane to explore\nthe content of the case study before you answer the questions. Clicking these buttons displays information such\nas business requirements, existing environment, and problem statements. If the case study has an All Information\ntab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you\nare ready to answer a question, click the Question button to return to the question.\nOverview\n-\nLitware, Inc. is a publishing company that has an online bookstore and several retail bookstores worldwide. Litware\nalso manages an online advertising business for the authors it represents.\nExisting Environment. Fabric Environment\nLitware has a Fabric workspace named Workspace1. High concurrency is enabled for Workspace1.\nThe company has a data engineering team t  find queries that cause more than one failure.\nWhen the authors have new book releases, there is often an increase in sales activity. This increase slows the data\ningestion process.\nThe company’s sales team reports that during the last month, the sales data has NOT been up-to-date when they\narrive at work in the morning.\nRequirements. Planned Changes\n-\nLitware recently signed a contract to receive book reviews. The provider of the reviews exposes the data in\nAmazon Simple Storage Service (Amazon S3) buckets.\nLitware plans to manage Search Engine Optimization (SEO) for the authors. The SEO data will be streamed from a\nREST API.\nRequirements. Version Control\n-\nLitware plans to implement a version control solution in Fabric that will use GitHub integration and follow the\nprinciple of least privilege.\nRequirements. Governance Requirements\nTo control data platform costs, the data platform must use only Fabric services and items. Additional Azure\nresources must NOT be provisioned.\nRequirements. Data Requirements\nLitware identifies the following data requirements:\n•Process the SEO data in near-real-time (NRT).\n•Make the book reviews available in the lakehouse without making a copy of the data.\n•When a new book cover image arrives in the Files folder, process the image as soon as possible.\nYou need to ensure that the authors can see only their respective sales data.\nHow should you complete the statement? To answer, drag the appropriate values the correct targets. Each value\n\n\nmay be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view\ncontent.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"SCHEMABINDING: Ensures the function is bound to the schema of the referenced objects. Required for RLS functions. USER_NAME() returns the SQL Server login or database user name. AuthorSales: The RLS policy is applied to the AuthorSales table. Note: This question is part of suffix padding) - to expose first and last n characters, adding custom padding 'xxx' of a text field","correctText":"Explanation:"},{"prompt":"HOTSPOT\n-\nYou are building a data orchestration pattern by using a Fabric data pipeline named Dynamic Data Copy as shown\nin the exhibit. (Click the Exhibit tab.)\nDynamic Data Copy does NOT use parametrization.\nYou need to configure the ForEach activity to receive the list of tables to be copied.\nHow should you complete the pipeline expression? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"Lookup Schema and Table. A lookup activity is typically used to retrieve (or \"look up\") data from a data source (like a database) — for example, fetching a list of tables, schemas, or specific records. output.value. The lookup operation usually returns results inside the value property. This is where the actual data retrieved by the lookup is stored — typically an array or object that can then be used by other activities (like a ForEach loop or a copy activity).","correctText":"Explanation:"},{"prompt":"HOTSPOT\n-\nYou have a Fabric workspace that contains a warehouse named Warehouse1. Warehouse1 contains a table named\nDimCustomers. DimCustomers contains the following columns:\n•CustomerName\n•CustomerID\n•BirthDate\n•EmailAddress\nYou need to configure security to meet the following requirements:\n•BirthDate in DimCustomer must be masked and display 1900-01-01.\n•EmailAddress in DimCustomer must be masked and display only the first leading character and the last five\ncharacters.\nHow should you complete the statement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"default() replaces the actual value with a fixed masking value based on the column’s data type: For date, it typically shows: 1900-01-01 For int, it shows: 0 For string, it shows: XXXX or an equivalent placeholder 'partial(1,\"@\",5)') Applies the partial() masking function to the EmailAddress column. partial(prefix, padding, suffix): prefix = 1: Show the first 1 character. padding = \"@\": Replace the middle characters with @. suffix = 5: Show the last 5 characters.","correctText":"Explanation:"},{"prompt":"You have a Fabric workspace named Workspace1 that contains the following items: •A Microsoft Power BI report named Report1 •A Power BI dashboard named Dashboard1 •A semantic model named Model1 •A lakehouse name Lakehouse1 Your company requires that specific governance processes be implemented for the items. Which items can you endorse in Fabric?","options":["Lakehouse1, Model1, and Dashboard1 only","Lakehouse1, Model1, Report1 and Dashboard1","Report1 and Dashboard1 only","Model1, Report1, and Dashboard1 only","Lakehouse1, Model1, and Report1 only"],"explanation":"B. Lakehouse1, Model1, Report1, and Dashboard1 is the correct answer . Lakehouse Yes Can be endorsed to show it's a trusted data source Model (Semantic Model) Yes Frequently used in Power BI, key for analytics and reporting Report Yes Reports can be promoted/certified to guide users toward reliable content DashboardYes Dashboards can also be endorsed for visibility and trust","correctIndex":1},{"prompt":"You have a Fabric workspace named Workspace1. Your company acquires GitHub licenses. You need to configure source control for Workpace1 to use GitHub. The solution must follow the principle of least privilege. Which permissions do you require to ensure that you can commit code to GitHub?","options":["Actions (Read and write) and Contents (Read and write)","Actions (Read and write) only","Contents (Read and write) only","Contents (Read) and Commit statuses (Read and write)"],"explanation":"C. Contents (Read and write) only. To commit code to GitHub while adhering to the principle of least privilege, you need permissions limited to Contents (Read and write) to access and update the repository's content. This ensures you can perform the required actions without granting unnecessary permissions like Actions, which are not needed for committing code.","correctIndex":2},{"prompt":"You have a Fabric workspace named Workspace1. You plan to configure Git integration for Workspace1 by using an Azure DevOps Git repository. An Azure DevOps admin creates the required artifacts to support the integration of Workspace1. Which details do you require to perform the integration?","options":["the organization, project, Git repository, and branch","the personal access token (PAT) for Git authentication and the Git repository URL","the project, Git repository, branch, and Git folder","the Git repository URL and the Git folder"],"explanation":"A. the organization, project, Git repository, and branch. To configure Git integration for a Microsoft Fabric workspace with an Azure DevOps Git repository, you need to provide details about the organization, project, Git repository, and branch2. These details ensure that the workspace is correctly linked to the desired repository and branch for version control and collaboration.","correctIndex":0},{"prompt":"You have a Fabric workspace that contains a lakehouse and a semantic model named Model1. You use a notebook named Notebook1 to ingest and transform data from an external data source. You need to execute Notebook1 as part of a data pipeline named Pipeline1. The process must meet the following requirements: •Run daily at 07:00 AM UTC. •Attempt to retry Notebook1 twice if the notebook fails. •After Notebook1 executes successfully, refresh Model1. Which three actions should you perform? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Place the Semantic model refresh activity after the Notebook activity and link the activities by using the On success condition.","From the Schedule settings of Pipeline1, set the time zone to UTC.","Set the Retry setting of the Notebook activity to 2.","From the Schedule settings of Notebook1, set the time zone to UTC.","Set the Retry setting of the Semantic model refresh activity to 2.","Place the Semantic model refresh activity after the Notebook activity and link the activities by using an On completion condition."],"explanation":"A. Place the Semantic model refresh activity after the Notebook activity and link the activities by using the On success condition. B. From the Schedule settings of Pipeline1, set the time zone to UTC. C. Set the Retry setting of the Notebook activity to 2. A - On Success condition: Ensures proper sequencing. The semantic model refresh activity will only run if the Notebook activity is successful. B - Time zone setting for Pipeline1: By configuring the time zone to UTC, the scheduling of the pipeline becomes consistent and clear across global teams or systems. C - Retry setting for Notebook: Setting a retry count helps ensure robustness, as transient failures can automatically trigger retries to avoid manual intervention.","correctText":"ABC"},{"prompt":"You have a Fabric workspace that contains a lakehouse named Lakehouse1. You plan to create a data pipeline named Pipeline1 to ingest data into Lakehouse1. You will use a parameter named param1 to pass an external value into Pipeline1. The param1 parameter has a data type of int. You need to ensure that the pipeline expression returns param1 as an int value. How should you specify the parameter value?","options":["\"@pipeline().parameters.param1\"","\"@ pipeline().parameters.param1 \"","\"@ pipeline().parameters.[param1] \"","\"@@ pipeline().parameters.param1 \""],"explanation":"B. \"@ pipeline().parameters.param1 \". The syntax @ pipeline().parameters.param1 is used in data pipelines to dynamically reference the parameter param1. This ensures that the parameter value is correctly evaluated as an integer during pipeline execution. The curly braces are essential for indicating dynamic expression evaluation.","correctIndex":1},{"prompt":"You have a Fabric workspace named Workspace1 that contains a lakehouse named Lakehouse1. Workspace1 contains the following items: •A Dataflow Gen2 dataflow that copies data from an on-premises Microsoft SQL Server database to Lakehouse1 •A notebook that transforms files and loads the data to Lakehouse1 •A data pipeline that loads a CSV file to Lakehouse1 You need to develop an orchestration solution in Fabric that will load each item one after the other. The solution must be scheduled to run every 15 minutes. Which type of item should you use?","options":["notebook","warehouse","Dataflow Gen2 dataflow","data pipeline"],"explanation":"D. data pipeline. A data pipeline is designed for orchestrating and scheduling workflows in Fabric. It enables you to load items sequentially (one after the other) and can be set to run on a defined schedule, such as every 15 minutes. This makes it the ideal choice for your requirement.","correctIndex":3},{"prompt":"You are building a Fabric notebook named MasterNotebook1 in a workspace. MasterNotebook1 contains the following code. You need to ensure that the notebooks are executed in the following sequence: 1. Notebook_03 2. Notebook_01 3. Notebook_02 Which two actions should you perform? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Move the declaration of Notebook_02 to the bottom of the Directed Acyclic Graph (DAG) definition.","Add dependencies to the execution of Notebook_03.","Split the Directed Acyclic Graph (DAG) definition into three separate definitions.","Add dependencies to the execution of Notebook_02.","Change the concurrency to 3.","Move the declaration of Notebook_03 to the top of the Directed Acyclic Graph (DAG) definition."],"explanation":"D. Add dependencies to the execution of Notebook_02: Adding dependencies ensures that Notebook_02 runs in the proper order within the Directed Acyclic Graph (DAG), maintaining task execution logic and avoiding conflicts. F. Move the declaration of Notebook_03 to the top of the Directed Acyclic Graph (DAG) definition: Reordering the declaration of Notebook_03 ensures it aligns with the intended flow of execution within the DAG, helping maintain the logical sequencing of tasks.","correctText":"DF"},{"prompt":"You have a Fabric workspace that contains a data pipeline named Pipeline1 as shown in the exhibit. (Click the Exhibit tab.) What will occur the next time Pipeline1 runs?","options":["Copy_kdi will run first, and then Execute procedure1 will run.","Execute procedure1 will run first, and then Copy_kdi will run.","Execute procedure1 will run and Copy_kdi will be skipped.","Copy_kdi will run and Execute procedure1 will be skipped.","Both activities will run simultaneously.","Both activities will be skipped."],"explanation":"D. Copy_kdi will run and Execute procedure1 will be skipped . Copy_kdi is set to run, and Execute procedure1 will be skipped under certain conditions or because of pipeline configuration, perhaps based on dependencies, conditions, or a failure in a prior step. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question. Overview. Company Overview - Contoso, Ltd. is an online retail company that wants to modernize its analytics platform by moving to Fabric. The company plans to begin using Fabric for marketing analytics. Overview. IT Structure - The company’s IT department has a team of data analysts and a team of data engineers that use analytics systems. The data engineers perform the ingestion, transformation, and loading of data. They prefer to use Python or SQL to transform the data. The data analysts query data and create semantic models and reports. They are qualified to write queries in Power Query and T-SQL. Existing Environment. Fabric - Contoso has an F64 capacity named Cap1. All Fabric users are allowed to create items. Contoso has two workspaces named WorkspaceA and WorkspaceB that currently use Pro license mode. Existing Environment. Source Systems Contoso has a point of sale (POS) system named POS1 that uses an instance of SQL Server on Azure Virtual Machines in the same Microsoft Entra tenant as Fabric. The host virtual machine is on a private virtual network that has public access blocked. POS1 contains all the sales transactions that were processed on the company’s website. The company has a software as a service (SaaS) online marketing app named MAR1. MAR1 has seven entities. The entities contain data that relates to email open rates and interaction rates, as well as website interactions. The data can be exported from MAR1 by calling REST APIs. Each entity has a different endpoint. Contoso has been using MAR1 for one year. Data from prior years is stored in Parquet files in an Amazon Simple Storage Service (Amazon S3) bucket. There are 12 files that range in size from 300 MB to 900 MB and relate to email interactions. Existing Environment. Product Data POS1 contains a product list and related data. The data comes from the following three tables: •Products •ProductCategories •ProductSubcategories In the data, products are related to product subcategories, and subcategories are related to product categories. Existing Environment. Azure - Contoso has a Microsoft Entra tenant that has the following mail-enabled security groups: •DataAnalysts: Contains the data analysts •DataEngineers: Contains the data engineers Contoso has an Azure subscription. The company has an existing Azure DevOps organization and creates a new project for repositories that relate to Fabric. Existing Environment. User Problems The VP of marketing at Contoso requires analysis on the effectiveness of different types of email content. It typically takes a week to manually compile and analyze the data. Contoso wants to reduce the time to less than one day by using Fabric. The data engineering team has successfully exported data from MAR1. The team experiences transient connectivity errors, which causes the data exports to fail. Requirements. Planned Changes - Contoso plans to create the following two lakehouses: •Lakehouse1: Will store both raw and cleansed data from the sources •Lakehouse2: Will serve data in a dimensional model to users for analytical queries Additional items will be added to facilitate data ingestion and transformation. Contoso plans to use Azure Repos for source control in Fabric. Requirements. Technical Requirements The new lakehouses must follow a medallion architecture by using the following three layers: bronze, silver, and gold. There will be extensive data cleansing required to populate the MAR1 data in the silver layer, including deduplication, the handling of missing values, and the standardizing of capitalization. Each layer must be fully populated before moving on to the next layer. If any step in populating the lakehouses fails, an email must be sent to the data engineers. Data imports must run simultaneously, when possible. The use of email data from the Amazon S3 bucket must meet the following requirements: •Minimize egress costs associated with cross-cloud data access. •Prevent saving a copy of the raw data in the lakehouses. Items that relate to data ingestion must meet the following requirements: •The items must be source controlled alongside other workspace items. •Ingested data must land in the bronze layer of Lakehouse1 in the Delta format. •No changes other than changes to the file formats must be implemented before the data lands in the bronze layer. •Development effort must be minimized and a built-in connection must be used to import the source data. •In the event of a connectivity error, the ingestion processes must attempt the connection again. Lakehouses, data pipelines, and notebooks must be stored in WorkspaceA. Semantic models, reports, and dataflows must be stored in WorkspaceB. Once a week, old files that are no longer referenced by a Delta table log must be removed. Requirements. Data Transformation In the POS1 product data, ProductID values are unique. The product dimension in the gold layer must include only active products from product list. Active products are identified by an IsActive value of 1. Some product categories and subcategories are NOT assigned to any product. They are NOT analytically relevant and must be omitted from the product dimension in the gold layer. Requirements. Data Security - Security in Fabric must meet the following requirements: •The data engineers must have read and write access to all the lakehouses, including the underlying files. •The data analysts must only have read access to the Delta tables in the gold layer. •The data analysts must NOT have access to the data in the bronze and silver layers. •The data engineers must be able to commit changes to source control in WorkspaceA.","correctIndex":3},{"prompt":"You need to ensure that WorkspaceA can be configured for source control. Which two actions should you perform? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["From Tenant setting, set Users can synchronize workspace items with their Git repositories to Enabled.","From Tenant setting, set Users can sync workspace items with GitHub repositories to Enabled.","Configure WorkspaceA to use a Premium Per User (PPU) license.","Assign WorkspaceA to Cap1."],"explanation":"A. From Tenant setting, set Users can synchronize workspace items with their Git repositories to Enabled. This setting enables Git integration for workspaces at the tenant level. Without enabling this, users cannot link a workspace to a Git repo. D. Assign WorkspaceA to Cap1. Cap1 refers to a deployment pipeline capacity, typically a Premium capacity. Workspaces must be assigned to a capacity that supports Git integration, not just shared or PPU. Git integration requires Premium capacity (P SKUs or Embedded A SKUs), not just PPU.","correctText":"AD"},{"prompt":"HOTSPOT\n-\nYou have a Fabric workspace that contains a warehouse named Warehouse1. Warehouse1 contains a table named\nCustomer. Customer contains the following data.\nYou have an internal Microsoft Entra user named User1 that has an email address of \n[email protected]\n.\nYou need to provide User1 with access to the Customer table. The solution must prevent User1 from accessing the\nCreditCard column.\nHow should you complete the statement? To answer, select the appropriate options in the answer area.\nNOTE: Each correct selection is worth one point.","options":[],"explanation":"GRANT: SELECT. The SELECT permission allows a es without making a copy of the data. This means you can make the book reviews available in the lakehouse by creating a shortcut to the location where the book reviews are stored. The data remains in its original location but is accessible from the lakehouse, meeting the requirement of not duplicating the data. Case Study - This is a case study. Case studies are not timed separately. You can use as much exam time as you would like to complete each case. However, there may be additional case studies and sections on this exam. You must manage your time to ensure that you are able to complete all questions included on this exam in the time provided. To answer the questions included in a case study, you will need to reference information that is provided in the case study. Case studies might contain exhibits and other resources that provide more information about the scenario that is described in the case study. Each question is independent of the other questions in this case study. At the end of this case study, a review screen will appear. This screen allows you to review your answers and to make changes before you move to the next section of the exam. After you begin a new section, you cannot return to this section. To start the case study - To display the first question in this case study, click the Next button. Use the buttons in the left pane to explore the content of the case study before you answer the questions. Clicking these buttons displays information such as business requirements, existing environment, and problem statements. If the case study has an All Information tab, note that the information displayed is identical to the information displayed on the subsequent tabs. When you are ready to answer a question, click the Question button to return to the question. Overview - Litware, Inc. is a publishing company that has an online bookstore and several retail bookstores worldwide. Litware also manages an online advertising business for the authors it repres
