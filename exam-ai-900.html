  <script type="application/json" id="embedded-exam-payload" data-exam-slug="ai-900">{"id":"ai-900","title":"AI-900","examName":"Microsoft Azure AI Fundamentals","questions":[{"prompt":"A company employs a team of customer service agents to provide telephone and email support to customers. The company develops a webchat bot to provide automated answers to common customer queries. Which business benefit should the company expect as a result of creating the webchat bot solution?","options":["increased sales","a reduced workload for the customer service agents","improved product reliability"],"correctIndex":1},{"prompt":"For a machine learning progress, how should you split data for training and evaluation?","options":["Use features for training and labels for evaluation.","Randomly split the data into rows for training and rows for evaluation.","Use labels for training and features for evaluation.","Randomly split the data into columns for training and columns for evaluation."],"correctIndex":1},{"prompt":"HOTSPOT You are developing a model to predict events by using classification. You have a confusion matrix for the model scored on test data as shown in the following exhibit. Use the drop-down menus to select the answer choice that completes each statement based on the information presented in the graphic. NOTE: Each correct selection is worth one point.","options":[],"images":[{"src":"assets/exams/ai-900/pdf-page-2-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-3-img-0.png","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-3-img-1.png","alt":"Exam figure 3","caption":"Answer area"}],"explanation":"Box 1: 11 TP = True Positive. The class labels in the training set can take on only two possible values, which we usually refer to as positive or negative. The positive and negative instances that a classifier predicts correctly are called true positives (TP) and true negatives (TN), respectively. Similarly, the incorrectly classified instances are called false positives (FP) and false negatives (FN). Box 2: 1,033 FN = False Negative Reference: https://docs.microsoft.com/en-us/azure/machine-learning/studio/evaluate-model-performance"},{"prompt":"You build a machine learning model by using the automated machine learning user interface (UI). You need to ensure that the model meets the Microsoft transparency principle for responsible AI. What should you do?","options":["Set Validation type to Auto.","Enable Explain best model.","Set Primary metric to accuracy.","Set Max concurrent iterations to 0."],"correctIndex":1},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: No Box 2: Yes Box 3: No Anomaly detection encompasses many important tasks in machine learning: Identifying transactions that are potentially fraudulent. Learning patterns that indicate that a network intrusion has occurred. Finding abnormal clusters of patients. Checking values entered into a system. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/studio-module-reference/anomaly- detection","images":[{"src":"assets/exams/ai-900/pdf-page-5-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-5-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reliability and safety: AI systems need to be reliable and safe in order to be trusted. It is important for a system to perform as it was originally designed and for it to respond safely to new situations. Its inherent resilience should resist intended or unintended manipulation. Rigorous testing and validation should be established for operating conditions to ensure that the system responds safely to edge cases, and A/B testing and champion/challenger methods should be integrated into the evaluation process. An AI system's performance can degrade over time, so a robust monitoring and model tracking process needs to be established to reactively and proactively measure the model's performance and retrain it, as necessary, to modernize it. Reference: https://docs.microsoft.com/en-us/azure/cloud-adoption-framework/innovate/best- practices/trusted-ai","images":[{"src":"assets/exams/ai-900/pdf-page-6-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-6-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the types of AI workloads to the appropriate scenarios. To answer, drag the appropriate workload type from the column on the left to its scenario on the right. Each workload type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 3: Natural language processing Natural language processing (NLP) is used for tasks such as sentiment analysis, topic detection, language detection, key phrase extraction, and document categorization. Reference: https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/natural- language-processing","images":[{"src":"assets/exams/ai-900/pdf-page-7-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You are designing an AI system that empowers everyone, including people who have hearing, visual, and other impairments. This is an example of which Microsoft guiding principle for responsible AI?","options":["fairness","inclusiveness","reliability and safety","accountability"],"correctIndex":1},{"prompt":"DRAG DROP Match the Microsoft guiding principles for responsible AI to the appropriate descriptions. To answer, drag the appropriate principle from the column on the left to its description on the right. Each principle may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Reliability and safety To build trust, it's critical that AI systems operate reliably, safely, and consistently under normal circumstances and in unexpected conditions. These systems should be able to operate as they were originally designed, respond safely to unanticipated conditions, and resist harmful manipulation. Box 2: Accountability The people who design and deploy AI systems must be accountable for how their systems operate. Organizations should draw upon industry standards to develop accountability norms. These norms can ensure that AI systems are not the final authority on any decision that impacts people's lives and that humans maintain meaningful control over otherwise highly autonomous AI systems. Box 3: Privacy and security As AI becomes more prevalent, protecting privacy and securing important personal and business information is becoming more critical and complex. With AI, privacy and data security issues require especially close attention because access to data is essential for AI systems to make accurate and informed predictions and decisions about people. AI systems must comply with privacy laws that require transparency about the collection, use, and storage of data and mandate that consumers have appropriate controls to choose how their data is used Reference: https://docs.microsoft.com/en-us/learn/modules/responsible-ai-principles/4-guiding-principles","images":[{"src":"assets/exams/ai-900/pdf-page-9-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-9-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reliability and safety: To build trust, it's critical that AI systems operate reliably, safely, and consistently under normal circumstances and in unexpected conditions. These systems should be able to operate as they were originally designed, respond safely to unanticipated conditions, and resist harmful manipulation. Reference: https://docs.microsoft.com/en-us/learn/modules/responsible-ai-principles/4-guiding-principles","images":[{"src":"assets/exams/ai-900/pdf-page-10-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-10-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You are building an AI system. Which task should you include to ensure that the service meets the Microsoft transparency principle for responsible AI?","options":["Ensure that all visuals have an associated text that can be read by a screen reader.","Enable autoscaling to ensure that a service scales based on demand.","Provide documentation to help developers debug code.","Ensure that a training dataset is representative of the population."],"correctIndex":2},{"prompt":"DRAG DROP Match the types of AI workloads to the appropriate scenarios. To answer, drag the appropriate workload type from the column on the left to its scenario on the right. Each workload type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/learn/paths/get-started-with-artificial-intelligence-on-azure/","images":[{"src":"assets/exams/ai-900/pdf-page-11-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"Your company is exploring the use of voice recognition technologies in its smart home devices. The company wants to identify any barriers that might unintentionally leave out specific user groups. This an example of which Microsoft guiding principle for responsible AI?","options":["accountability","fairness","inclusiveness","privacy and security"],"correctIndex":2},{"prompt":"What are three Microsoft guiding principles for responsible AI? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["knowledgeability","decisiveness","inclusiveness","fairness","opinionatedness F. reliability and safety"],"correctIndex":2},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/concept-object- detection","images":[{"src":"assets/exams/ai-900/pdf-page-13-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-13-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/machine-learning/team-data-science-process/create- features","images":[{"src":"assets/exams/ai-900/pdf-page-14-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-14-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You run a charity event that involves posting photos of people wearing sunglasses on Twitter. You need to ensure that you only retweet photos that meet the following requirements: • Include one or more faces. • Contain at least one person wearing sunglasses. What should you use to analyze the images?","options":["the Verify operation in the Face service","the Detect operation in the Face service","the Describe Image operation in the Computer Vision service","the Analyze Image operation in the Computer Vision service"],"correctIndex":1},{"prompt":"When you design an AI system to assess whether loans should be approved, the factors used to make the decision should be explainable. This is an example of which Microsoft guiding principle for responsible AI?","options":["transparency","inclusiveness","fairness","privacy and security"],"correctIndex":0},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Achieving transparency helps the team to understand the data and algorithms used to train the model, what transformation logic was applied to the data, the final model generated, and its associated assets. This information offers insights about how the model was created, which allows it to be reproduced in a transparent way. Box 2: No A data holder is obligated to protect the data in an AI system, and privacy and security are an integral part of this system. Personal needs to be secured, and it should be accessed in a way that doesn't compromise an individual's privacy. Box 3: No Inclusiveness mandates that AI should consider all human races and experiences, and inclusive design practices can help developers to understand and address potential barriers that could unintentionally exclude people. Where possible, speech-to-text, text-to-speech, and visual recognition technology should be used to empower people with hearing, visual, and other impairments. Reference: https://docs.microsoft.com/en-us/azure/cloud-adoption-framework/innovate/best- practices/trusted-ai","images":[{"src":"assets/exams/ai-900/pdf-page-16-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-16-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the principles of responsible AI to the appropriate requirements. To answer, drag the appropriate principles from the column on the left to its requirement on the right. Each principle may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cloud-adoption-framework/innovate/best- practices/trusted-ai https://docs.microsoft.com/en-us/learn/modules/responsible-ai-principles/4-guiding-principles","images":[{"src":"assets/exams/ai-900/pdf-page-17-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"DRAG DROP You plan to deploy an Azure Machine Learning model as a service that will be used by client applications. Which three processes should you perform in sequence before you deploy the model? To answer, move the appropriate processes from the list of processes to the answer area and arrange them in the correct order.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/machine-learning/concept-ml-pipelines","images":[{"src":"assets/exams/ai-900/pdf-page-18-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-18-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You are building an AI-based app. You need to ensure that the app uses the principles for responsible AI. Which two principles should you follow? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Implement an Agile software development methodology","Implement a process of AI model validation as part of the software review process","Establish a risk governance committee that includes members of the legal team, members of the risk management team, and a privacy officer","Prevent the disclosure of the use of AI-based algorithms for automated decision making"],"correctIndex":1},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cloud-adoption-framework/innovate/best- practices/trusted-ai","images":[{"src":"assets/exams/ai-900/pdf-page-19-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Fairness is a core ethical principle that all humans aim to understand and apply. This principle is even more important when AI systems are being developed. Key checks and balances need to make sure that the system's decisions don't discriminate or run a gender, race, sexual orientation, or religion bias toward a group or individual. Reference: https://docs.microsoft.com/en-us/azure/cloud-adoption-framework/innovate/best- practices/trusted-ai","images":[{"src":"assets/exams/ai-900/pdf-page-20-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-20-img-1.png","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-20-img-2.jpg","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the types of AI workloads to the appropriate scenarios. To answer, drag the appropriate workload type from the column on the left to its scenario on the right. Each workload type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Knowledge mining You can use Azure Cognitive Search's knowledge mining results and populate your knowledge base of your chatbot. Box 2: Computer vision Box 3: Natural language processing Natural language processing (NLP) is used for tasks such as sentiment analysis. Reference: https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology- choices/natural-language-processing","images":[{"src":"assets/exams/ai-900/pdf-page-21-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-21-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the principles of responsible AI to the appropriate descriptions. To answer, drag the appropriate principle from the column on the left to its description on the right. Each principle may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Reliability and safety Reliability and safety: AI systems should perform reliably and safely. Box 2: Privacy and security Privacy and security: AI systems should be secure and respect privacy. Incorrect: Inclusiveness: AI systems should empower everyone and engage people. Fairness: AI systems should treat all people fairly. Reference: https://docs.microsoft.com/en-us/azure/cloud-adoption- framework/strategy/responsible-ai","images":[{"src":"assets/exams/ai-900/pdf-page-22-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-22-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"During the process of Machine Learning, when should you review evaluation metrics.","options":["Before you train a model.","After you clean the data.","Before you choose the type of model.","After you test a model on the validation data."],"correctIndex":3},{"prompt":"You have a natural language processing (NLP) model that was created by using data obtained without permission. Which Microsoft principle for responsible AI does this breach?","options":["reliability and safety","privacy and security","inclusiveness","transparency"],"correctIndex":3},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Original exam UI used an image or drag-and-drop; only coordinates were embedded in the source file. Expand “Show answer” if a reference URL or boxed answer appears below.","images":[{"src":"assets/exams/ai-900/pdf-page-24-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"DRAG DROP Match the services to the appropriate descriptions. To answer, drag the appropriate service from the column on the left to its description on the right. Each service may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Azure Bot Service You can link a QnA Maker knowledge base to an Azure Bot Service. Box 2: Speech Language and voice support for the Speech service. Speech service provides speech-to-text, text-to-speech, pronunciation assessment, speech translation, speaker recognition, and additional service features. Incorrect: * Language Service Reference: https://learn.microsoft.com/en-us/azure/cognitive-services/qnamaker/tutorials/create- faq-bot-with-azure-bot-service https://learn.microsoft.com/en-us/azure/cognitive-services/speech-service/language-support https://learn.microsoft.com/en-us/azure/architecture/solution-ideas/articles/loan-chargeoff- prediction-with-sql-server","images":[{"src":"assets/exams/ai-900/pdf-page-24-img-1.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"Which machine learning technique can be used for anomaly detection?","options":["A machine learning technique that classifies objects based on user supplied images.","A machine learning technique that understands written and spoken language.","A machine learning technique that classifies images based on their contents.","A machine learning technique that analyzes data over time and identifies unusual changes."],"correctIndex":3},{"prompt":"You have an AI-based loan approval system. During testing, you discover that the system has a gender bias. Which responsible Al principle does this violate?","options":["accountability","reliability and safety","transparency","fairness"],"correctIndex":3},{"prompt":"DRAG DROP Match the machine learning tasks to the appropriate scenarios. To answer, drag the appropriate task from the column on the left to its scenario on the right. Each task may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Model evaluation The Model evaluation module outputs a confusion matrix showing the number of true positives, false negatives, false positives, and true negatives, as well as ROC, Precision/Recall, and Lift curves. Box 2: Feature engineering Feature engineering is the process of using domain knowledge of the data to create features that help ML algorithms learn better. In Azure Machine Learning, scaling and normalization techniques are applied to facilitate feature engineering. Collectively, these techniques and feature engineering are referred to as featurization. Note: Often, features are created from raw data through a process of feature engineering. For example, a time stamp in itself might not be useful for modeling until the information is transformed into units of days, months, or categories that are relevant to the problem, such as holiday versus working day. Box 3: Feature selection In machine learning and statistics, feature selection is the process of selecting a subset of relevant, useful features to use in building an analytical model. Feature selection helps narrow the field of data to the most valuable inputs. Narrowing the field of data helps reduce noise and improve training performance. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/studio/evaluate-model-performance https://docs.microsoft.com/en-us/azure/machine-learning/concept-automated-ml","images":[{"src":"assets/exams/ai-900/pdf-page-27-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-27-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://www.baeldung.com/cs/feature-vs-label https://machinelearningmastery.com/discover-feature-engineering-how-to-engineer-features-and- how-to-get-good-at-it/","images":[{"src":"assets/exams/ai-900/pdf-page-28-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You have the Predicted vs. True chart shown in the following exhibit. Which type of model is the chart used to evaluate?","options":["classification","regression","clustering"],"correctIndex":1},{"prompt":"Which type of machine learning should you use to predict the number of gift cards that will be sold next month?","options":["classification","regression","clustering"],"correctIndex":1},{"prompt":"You have a dataset that contains information about taxi journeys that occurred during a given period. You need to train a model to predict the fare of a taxi journey. What should you use as a feature?","options":["the number of taxi journeys in the dataset","the trip distance of individual taxi journeys","the fare of individual taxi journeys","the trip ID of individual taxi journeys"],"correctIndex":1},{"prompt":"You need to predict the sea level in meters for the next 10 years. Which type of machine learning should you use?","options":["classification","regression","clustering"],"correctIndex":1},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Automated machine learning, also referred to as automated ML or AutoML, is the process of automating the time consuming, iterative tasks of machine learning model development. It allows data scientists, analysts, and developers to build ML models with high scale, efficiency, and productivity all while sustaining model quality. Box 2: No Box 3: Yes During training, Azure Machine Learning creates a number of pipelines in parallel that try different algorithms and parameters for you. The service iterates through ML algorithms paired with feature selections, where each iteration produces a model with a training score. The higher the score, the better the model is considered to \"fit\" your data. It will stop once it hits the exit criteria defined in the experiment. Box 4: No Apply automated ML when you want Azure Machine Learning to train and tune a model for you using the target metric you specify. The label is the column you want to predict. Reference: https://azure.microsoft.com/en-us/services/machine-learning/automatedml/#features","images":[{"src":"assets/exams/ai-900/pdf-page-32-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-32-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Two-class classification provides the answer to simple two-choice questions such as Yes/No or True/False.","images":[{"src":"assets/exams/ai-900/pdf-page-33-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes In machine learning, if you have labeled data, that means your data is marked up, or annotated, to show the target, which is the answer you want your machine learning model to predict. In general, data labeling can refer to tasks that include data tagging, annotation, classification, moderation, transcription, or processing. Box 2: No Box 3: No Accuracy is simply the proportion of correctly classified instances. It is usually the first metric you look at when evaluating a classifier. However, when the test data is unbalanced (where most of the instances belong to one of the classes), or you are more interested in the performance on either one of the classes, accuracy doesn't really capture the effectiveness of a classifier. Reference: https://www.cloudfactory.com/data-labeling-guide https://docs.microsoft.com/en-us/azure/machine-learning/studio/evaluate-model-performance","images":[{"src":"assets/exams/ai-900/pdf-page-34-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-34-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Which service should you use to extract text, key/value pairs, and table data automatically from scanned documents?","options":["Form Recognizer","Text Analytics","Language Understanding","Custom Vision"],"correctIndex":0},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Accelerate your business processes by automating information extraction. Form Recognizer applies advanced machine learning to accurately extract text, key/value pairs, and tables from documents. With just a few samples, Form Recognizer tailors its understanding to your documents, both on-premises and in the cloud. Turn forms into usable data at a fraction of the time and cost, so you can focus more time acting on the information rather than compiling it. Reference: https://azure.microsoft.com/en-us/services/cognitive-services/form-recognizer/","images":[{"src":"assets/exams/ai-900/pdf-page-36-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-36-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You use Azure Machine Learning designer to publish an inference pipeline. Which two parameters should you use to access the web service? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["the model name","the training endpoint","the authentication key","the REST endpoint"],"correctIndex":2},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"To perform real-time inferencing, you must deploy a pipeline as a real-time endpoint. Real-time endpoints must be deployed to an Azure Kubernetes Service cluster. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/concept-designer#deploy","images":[{"src":"assets/exams/ai-900/pdf-page-37-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"In the most basic sense, regression refers to prediction of a numeric target. Linear regression attempts to establish a linear relationship between one or more independent variables and a numeric outcome, or dependent variable. You use this module to define a linear regression method, and then train a model using a labeled dataset. The trained model can then be used to make predictions. Incorrect Answers: • Classification is a machine learning method that uses data to determine the category, type, or class of an item or row of data. • Clustering, in machine learning, is a method of grouping data points into similar clusters. It is also called segmentation. Over the years, many clustering algorithms have been developed. Almost all clustering algorithms use the features of individual items to find similar items. For example, you might apply clustering to find similar people by demographics. You might use clustering with text analysis to group sentences with similar topics or sentiment. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/algorithm-module-reference/linear- regression https://docs.microsoft.com/en-us/azure/machine-learning/studio-module-reference/machine- learning-initialize-model-clustering","images":[{"src":"assets/exams/ai-900/pdf-page-38-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-38-img-1.png","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-39-img-0.jpg","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Azure Machine Learning designer lets you visually connect datasets and modules on an interactive canvas to create machine learning models. Box 2: Yes With the designer you can connect the modules to create a pipeline draft. As you edit a pipeline in the designer, your progress is saved as a pipeline draft. Box 3: No Reference: https://docs.microsoft.com/en-us/azure/machine-learning/concept-designer","images":[{"src":"assets/exams/ai-900/pdf-page-40-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT You have the following dataset. You plan to use the dataset to train a model that will predict the house price categories of houses. What are Household Income and House Price Category? To answer, select the appropriate option in the answer area. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: A feature Box 2: A label Reference: https://docs.microsoft.com/en-us/azure/machine-learning/studio/interpret-model-results","images":[{"src":"assets/exams/ai-900/pdf-page-42-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-42-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/machine-learning/concept-designer","images":[{"src":"assets/exams/ai-900/pdf-page-43-img-0.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/machine-learning/how-to-designer-python https://docs.microsoft.com/en-us/azure/machine-learning/concept-automated-ml","images":[{"src":"assets/exams/ai-900/pdf-page-44-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-44-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"A medical research project uses a large anonymized dataset of brain scan images that are categorized into predefined brain haemorrhage types. You need to use machine learning to support early detection of the different brain haemorrhage types in the images before the images are reviewed by a person. This is an example of which type of machine learning?","options":["clustering","regression","classification"],"correctIndex":2},{"prompt":"When training a model, why should you randomly split the rows into separate subsets?","options":["to train the model twice to attain better accuracy","to train multiple models simultaneously to attain better performance","to test the model by using data that was not used to train the model"],"correctIndex":2},{"prompt":"You are evaluating whether to use a basic workspace or an enterprise workspace in Azure Machine Learning. What are two tasks that require an enterprise workspace? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["Use a graphical user interface (GUI) to run automated machine learning experiments.","Create a compute instance to use as a workstation.","Use a graphical user interface (GUI) to define and run machine learning experiments from Azure Machine Learning designer.","Create a dataset from a comma-separated value (CSV) file."],"correctIndex":0},{"prompt":"You need to predict the income range of a given customer by using the following dataset. Which two fields should you use as features? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["Education Level","Last Name","Age","Income Range","First Name"],"correctIndex":0},{"prompt":"You are building a tool that will process images from retail stores and identify the products of competitors. The solution will use a custom model. Which Azure Cognitive Services service should you use?","options":["Custom Vision","Form Recognizer","Face","Computer Vision"],"correctIndex":0},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Clustering is a machine learning task that is used to group instances of data into clusters that contain similar characteristics. Clustering can also be used to identify relationships in a dataset Regression is a machine learning task that is used to predict the value of the label from a set of related features. Reference: https://docs.microsoft.com/en-us/dotnet/machine-learning/resources/tasks","images":[{"src":"assets/exams/ai-900/pdf-page-48-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-48-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: No The validation dataset is different from the test dataset that is held back from the training of the model. Box 2: Yes A validation dataset is a sample of data that is used to give an estimate of model skill while tuning model’s hyperparameters. Box 3: No The Test Dataset, not the validation set, used for this. The Test Dataset is a sample of data used to provide an unbiased evaluation of a final model fit on the training dataset. Reference: https://machinelearningmastery.com/difference-test-validation-datasets/","images":[{"src":"assets/exams/ai-900/pdf-page-49-img-0.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"What are two metrics that you can use to evaluate a regression model? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["coefficient of determination (R2)","F1 score","root mean squared error (RMSE)","area under curve (AUC)","balanced accuracy"],"correctIndices":[0,2],"explanation":"A: R-squared (R2), or Coefficient of determination represents the predictive power of the model as a value between -inf and 1.00. 1.00 means there is a perfect fit, and the fit can be arbitrarily poor so the scores can be negative. C: RMS-loss or Root Mean Squared Error (RMSE) (also called Root Mean Square Deviation, RMSD), measures the difference between values predicted by a model and the values observed from the environment that is being modeled. Incorrect Answers: B: F1 score also known as balanced F-score or F-measure is used to evaluate a classification model. D: aucROC or area under the curve (AUC) is used to evaluate a classification model. Reference: https://docs.microsoft.com/en-us/dotnet/machine-learning/resources/metrics"},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Regression is a machine learning task that is used to predict the value of the label from a set of related features. Reference: https://docs.microsoft.com/en-us/dotnet/machine-learning/resources/tasks","images":[{"src":"assets/exams/ai-900/pdf-page-51-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-51-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP You need to use Azure Machine Learning designer to build a model that will predict automobile prices. Which type of modules should you use to complete the model? To answer, drag the appropriate modules to the correct locations. Each module may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Select Columns in Dataset For Columns to be cleaned, choose the columns that contain the missing values you want to change. You can choose multiple columns, but you must use the same replacement method in all selected columns. Example: Box 2: Split data Splitting data is a common task in machine learning. You will split your data into two separate datasets. One dataset will train the model and the other will test how well the model performed. Box 3: Linear regression Because you want to predict price, which is a number, you can use a regression algorithm. For this example, you use a linear regression model. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/tutorial-designer-automobile-price- train-score","images":[{"src":"assets/exams/ai-900/pdf-page-52-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-53-img-0.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Which type of machine learning should you use to identify groups of people who have similar purchasing habits?","options":["classification","regression","clustering"],"correctIndex":2},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Regression is a machine learning task that is used to predict the value of the label from a set of related features. Reference: https://docs.microsoft.com/en-us/dotnet/machine-learning/resources/tasks","images":[{"src":"assets/exams/ai-900/pdf-page-55-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-55-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Which metric can you use to evaluate a classification model?","options":["true positive rate","mean absolute error (MAE)","coefficient of determination (R2)","root mean squared error (RMSE)"],"correctIndex":0},{"prompt":"Which two components can you drag onto a canvas in Azure Machine Learning designer? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["dataset","compute","pipeline","module"],"correctIndices":[0,3],"explanation":"You can drag-and-drop datasets and modules onto the canvas. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/concept-designer"},{"prompt":"You need to create a training dataset and validation dataset from an existing dataset. Which module in the Azure Machine Learning designer should you use?","options":["Select Columns in Dataset","Add Rows","Split Data","Join Data"],"correctIndex":2},{"prompt":"DRAG DROP Match the types of machine learning to the appropriate scenarios. To answer, drag the appropriate machine learning type from the column on the left to its scenario on the right. Each machine learning type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Regression In the most basic sense, regression refers to prediction of a numeric target. Linear regression attempts to establish a linear relationship between one or more independent variables and a numeric outcome, or dependent variable. You use this module to define a linear regression method, and then train a model using a labeled dataset. The trained model can then be used to make predictions. Box 2: Clustering Clustering, in machine learning, is a method of grouping data points into similar clusters. It is also called segmentation. Over the years, many clustering algorithms have been developed. Almost all clustering algorithms use the features of individual items to find similar items. For example, you might apply clustering to find similar people by demographics. You might use clustering with text analysis to group sentences with similar topics or sentiment. Box 3: Classification Two-class classification provides the answer to simple two-choice questions such as Yes/No or True/False. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/studio-module-reference/linear- regression","images":[{"src":"assets/exams/ai-900/pdf-page-57-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-57-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/custom-vision-service/getting-started- build-a-classifier","images":[{"src":"assets/exams/ai-900/pdf-page-58-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cloud-adoption-framework/innovate/best- practices/trusted-ai","images":[{"src":"assets/exams/ai-900/pdf-page-59-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/architecture/data-science-process/create-features","images":[{"src":"assets/exams/ai-900/pdf-page-59-img-1.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-59-img-2.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/machine-learning/how-to-label-data","images":[{"src":"assets/exams/ai-900/pdf-page-60-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-60-img-1.png","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-60-img-2.png","alt":"Exam figure 3","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-60-img-3.png","alt":"Exam figure 4","caption":"Answer area"}]},{"prompt":"HOTSPOT You have an Azure Machine Learning model that predicts product quality. The model has a training dataset that contains 50,000 records. A sample of the data is shown in the following table. For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/machine-learning/component-reference/filter-based- feature-selection","images":[{"src":"assets/exams/ai-900/pdf-page-61-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-61-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/learn/modules/create-regression-model-azure-machine- learning-designer/5-create-training-pipeline https://docs.microsoft.com/en-us/learn/modules/create-classification-model-azure-machine- learning-designer/introduction https://docs.microsoft.com/en-us/learn/modules/create-clustering-model-azure-machine- learning-designer/1-introduction","images":[{"src":"assets/exams/ai-900/pdf-page-62-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-62-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Which two actions are performed during the data ingestion and data preparation stage of an Azure Machine Learning process? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Calculate the accuracy of the model.","Score test data by using the model.","Combine multiple datasets.","Use the model for real-time predictions.","Remove records that have missing values."],"correctIndex":2},{"prompt":"You need to predict the animal population of an area. Which Azure Machine Learning type should you use?","options":["regression","clustering","classification"],"correctIndex":0},{"prompt":"Which two languages can you use to write custom code for Azure Machine Learning designer? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["Python","R","C#","Scala"],"correctIndices":[0,1],"explanation":"Use Azure Machine Learning designer for customizing using Python and R code. Reference: https://azure.microsoft.com/en-us/services/machine-learning/designer/#features"},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes For regression problems, the label column must contain numeric data that represents the response variable. Ideally the numeric data represents a continuous scale. Box 2: No K-Means Clustering Because the K-means algorithm is an unsupervised learning method, a label column is optional. If your data includes a label, you can use the label values to guide selection of the clusters and optimize the model. If your data has no label, the algorithm creates clusters representing possible categories, based solely on the data. Box 3: No For classification problems, the label column must contain either categorical values or discrete values. Some examples might be a yes/no rating, a disease classification code or name, or an income group. If you pick a noncategorical column, the component will return an error during training. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/component-reference/train- model https://docs.microsoft.com/en-us/azure/machine-learning/component-reference/k-means- clustering","images":[{"src":"assets/exams/ai-900/pdf-page-65-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-65-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You have a dataset. You need to build an Azure Machine Learning classification model that will identify defective products. What should you do first?","options":["Load the dataset.","Create a clustering model.","Split the data into training and testing datasets.","Create a classification model."],"correctIndex":2},{"prompt":"You use Azure Machine Learning designer to build a model pipeline. What should you create before you can run the pipeline?","options":["a registered model","a compute resource","a Jupyter notebook"],"correctIndex":1},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Dependent variables Different techniques of regression in azure machine learning. One of the most very common techniques in regression is Linear Regression. The linear regression is a linear approach to modeling the relationship between a dependent variable and one or more independent variables. For example, if you want to predict the house prices (dependent variable) by using independent variables of house location, house size, the relationship will be linear. Reference: https://www.sqlshack.com/prediction-with-regression-in-azure-machine-learning/","images":[{"src":"assets/exams/ai-900/pdf-page-67-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-67-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the tool to the Azure Machine Learning task. To answer, drag the appropriate tool from the column on the left to its tasks on the right. Each tool may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: The Azure portal Box 2: Machine Learning designer Box 3: Automated machine learning (automated ML) Automated machine learning, also referred to as automated ML or AutoML, is the process of automating the time-consuming, iterative tasks of machine learning model development. It allows data scientists, analysts, and developers to build ML models with high scale, efficiency, and productivity all while sustaining model quality. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/concept-automated-ml","images":[{"src":"assets/exams/ai-900/pdf-page-68-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-68-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You need to create a customer support solution to help customers access information. The solution must support email, phone, and live chat channels. Which type of Al solution should you use?","options":["machine learning","computer vision","chatbot","natural language processing (NLP)"],"correctIndex":2},{"prompt":"DRAG DROP Match the types of AI workloads to the appropriate scenarios. To answer, drag the appropriate workload type from the column on the left to its scenario on the right. Each workload type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Computer vision Optical character recognition (OCR), included in Computer Vision, allows you to extract printed or handwritten text from images, such as photos of street signs and products, as well as from documents — invoices, bills, financial reports, articles, and more Box 2: Natural language processing Choose a natural language processing service for sentiment analysis, topic and language detection, key phrase extraction, and document categorization. Box 3: Anomaly detection Box 4: Machine Learning (Clustering) Clustering is the task of dividing the population or data points into a number of groups such that data points in the same groups are more similar to other data points in the same group and dissimilar to the data points in other groups. It is basically a collection of objects on the basis of similarity and dissimilarity between them. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/overview- ocr https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/natural- language-processing https://www.geeksforgeeks.org/clustering-in-machine-learning/","images":[{"src":"assets/exams/ai-900/pdf-page-69-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"Predicting how many vehicles will travel across a bridge on a give day is an example of _______. Select the answer that correctly completes the sentence.","options":["regression","translation","classification","clustering"],"correctIndex":0},{"prompt":"In a machine learning model, the data that is used as inputs are called ________. Select the answer that correctly completes the sentence.","options":["dataset","labels","variables"],"correctIndex":1},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Original exam UI used an image or drag-and-drop; only coordinates were embedded in the source file. Expand “Show answer” if a reference URL or boxed answer appears below."},{"prompt":"DRAG DROP You plan to deploy an Azure Machine Learning model by using the Machine Learning designer. Which four actions should you perform in sequence? To answer, move the appropriate actions from the list of actions to the answer area and arrange them in the correct order.","options":[],"explanation":"Original exam UI used an image or drag-and-drop; only coordinates were embedded in the source file. Expand “Show answer” if a reference URL or boxed answer appears below.","images":[{"src":"assets/exams/ai-900/pdf-page-72-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-72-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-72-img-2.png","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Original exam UI used an image or drag-and-drop; only coordinates were embedded in the source file. Expand “Show answer” if a reference URL or boxed answer appears below.","images":[{"src":"assets/exams/ai-900/pdf-page-73-img-0.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Box 1: Numeric For regression problems, the label column must contain numeric data that represents the response variable. Ideally the numeric data represents a continuous scale. Reference: https://learn.microsoft.com/en-us/azure/machine-learning/component-reference/train- model","images":[{"src":"assets/exams/ai-900/pdf-page-73-img-1.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-73-img-2.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You need to create a clustering model and evaluate the model by using Azure Machine Learning designer. What should you do?","options":["Split the original dataset into a dataset for training and a dataset for testing. Use the testing dataset for evaluation.","Use the original dataset for training and evaluation.","Split the original dataset into a dataset for features and a dataset for labels. Use the features dataset for evaluation.","Split the original dataset into a dataset for training and a dataset for testing. Use the training dataset for evaluation."],"correctIndex":0},{"prompt":"You have a dataset that contains the columns shown in the following table. You have a machine learning model that predicts the value of ColumnE based on the other numeric columns. Which type of model is this?","options":["analysis","clustering","regression"],"correctIndex":2},{"prompt":"You need to track multiple versions of a model that was trained by using Azure Machine Learning. What should you do?","options":["Explain the model.","Register the model.","Register the training data.","Provision an inference cluster."],"correctIndex":1},{"prompt":"You need to identify groups of rows with similar numeric values in a dataset. Which type of machine learning should you use?","options":["clustering","regression","classification"],"correctIndex":0},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Box 1: Regression Regression is a supervised machine learning technique used to predict numeric values. Scenarios for regression machine learning models Regression machine learning models are used in many industries. A few scenarios are: Using characteristics of houses, such as square footage and number of rooms, to predict home prices. Using characteristics of farm conditions, such as weather and soil quality, to predict crop yield. Using characteristics of a past campaign, such as advertising logs, to predict future advertisement clicks. Note: Loan chargeoff prediction with SQL Server, example. Solution details A charged off loan is a loan that is declared by a creditor (usually a lending institution) that an amount of debt is unlikely to be collected, usually when the loan repayment is severely delinquent by the debtor. Given that high chargeoff has a negative impact on lending institutions’ year-end financials, lending institutions often monitor loan chargeoff risk very closely to prevent loans from getting charged-off. There are multiple benefits for lending institutions to equip with loan chargeoff prediction data. Charging off a loan is the last resort that the bank will do on a severely delinquent loan, with the prediction data at hand, the loan officer could offer personalized incentives like lower interest rate or longer repayment period to help customers to keep making loan payments and thus prevent the loan of getting charged off. To get to this type of prediction data, often credit unions or banks manually handcraft the data based on customers' past payment history and performed simple statistical regression analysis. Reference: https://learn.microsoft.com/en-us/training/modules/create-regression-model-azure- machine-learning-designer/2-regression-scenarios Topic 3, Describe features of computer vision workloads on Azure","images":[{"src":"assets/exams/ai-900/pdf-page-77-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-77-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Your company wants to build a recycling machine for bottles. The recycling machine must automatically identify bottles of the correct shape and reject all other items. Which type of AI workload should the company use?","options":["anomaly detection","conversational AI","computer vision","natural language processing"],"correctIndex":2},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/custom-vision-service/get-started- build-detector","images":[{"src":"assets/exams/ai-900/pdf-page-79-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"In which two scenarios can you use the Form Recognizer service? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["Extract the invoice number from an invoice.","Translate a form from French to English.","Find image of product in a catalog.","Identify the retailer from a receipt."],"correctIndex":0},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/overview https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/intro-to-spatial- analysis-public-preview","images":[{"src":"assets/exams/ai-900/pdf-page-80-img-0.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT You have a database that contains a list of employees and their photos. You are tagging new photos of the employees. For each of the following statements select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/face/overview https://docs.microsoft.com/en-us/azure/cognitive-services/face/concepts/face-detection","images":[{"src":"assets/exams/ai-900/pdf-page-81-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-81-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You need to develop a mobile app for employees to scan and store their expenses while travelling. Which type of computer vision should you use?","options":["semantic segmentation","image classification","object detection","optical character recognition (OCR)"],"correctIndex":3},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Custom Vision functionality can be divided into two features. Image classification applies one or more labels to an image. Object detection is similar, but it also returns the coordinates in the image where the applied label(s) can be found. Box 2: Yes The Custom Vision service uses a machine learning algorithm to analyze images. You, the developer, submit groups of images that feature and lack the characteristics in question. You label the images yourself at the time of submission. Then, the algorithm trains to this data and calculates its own accuracy by testing itself on those same images. Box 3: No Custom Vision service can be used only on graphic files. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/Custom-Vision-Service/overview","images":[{"src":"assets/exams/ai-900/pdf-page-83-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You are processing photos of runners in a race. You need to read the numbers on the runners’ shirts to identity the runners in the photos. Which type of computer vision should you use?","options":["facial recognition","optical character recognition (OCR)","image classification","object detection"],"correctIndex":1},{"prompt":"DRAG DROP Match the types of machine learning to the appropriate scenarios. To answer, drag the appropriate machine learning type from the column on the left to its scenario on the right. Each machine learning type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Image classification Image classification is a supervised learning problem: define a set of target classes (objects to identify in images), and train a model to recognize them using labeled example photos. Box 2: Object detection Object detection is a computer vision problem. While closely related to image classification, object detection performs image classification at a more granular scale. Object detection both locates and categorizes entities within images. Box 3: Semantic Segmentation Semantic segmentation achieves fine-grained inference by making dense predictions inferring labels for every pixel, so that each pixel is labeled with the class of its enclosing object ore region. Reference: https://developers.google.com/machine-learning/practica/image-classification https://docs.microsoft.com/en-us/dotnet/machine-learning/tutorials/object-detection-model- builder https://nanonets.com/blog/how-to-do-semantic-segmentation-using-deep-learning/","images":[{"src":"assets/exams/ai-900/pdf-page-85-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-85-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You use drones to identify where weeds grow between rows of crops to send an instruction for the removal of the weeds. This is an example of which type of computer vision?","options":["object detection","optical character recognition (OCR)","scene segmentation"],"correctIndex":0},{"prompt":"DRAG DROP Match the facial recognition tasks to the appropriate questions. To answer, drag the appropriate task from the column on the left to its question on the right. Each task may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: verification Face verification: Check the likelihood that two faces belong to the same person and receive a confidence score. Box 2: similarity Box 3: Grouping Box 4: identification Face detection: Detect one or more human faces along with attributes such as: age, emotion, pose, smile, and facial hair, including 27 landmarks for each face in the image. Reference: https://azure.microsoft.com/en-us/services/cognitive-services/face/#features","images":[{"src":"assets/exams/ai-900/pdf-page-87-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-87-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the types of computer vision workloads to the appropriate scenarios. To answer, drag the appropriate workload type from the column on the left to its scenario on the right. Each workload type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Facial recognition Face detection that perceives faces and attributes in an image; person identification that matches an individual in your private repository of up to 1 million people; perceived emotion recognition that detects a range of facial expressions like happiness, contempt, neutrality, and fear; and recognition and grouping of similar faces in images. Box 2: OCR Box 3: Objection detection Object detection is similar to tagging, but the API returns the bounding box coordinates (in pixels) for each object found. For example, if an image contains a dog, cat and person, the Detect operation will list those objects together with their coordinates in the image. You can use this functionality to process the relationships between the objects in an image. It also lets you determine whether there are multiple instances of the same tag in an image. The Detect API applies tags based on the objects or living things identified in the image. There is currently no formal relationship between the tagging taxonomy and the object detection taxonomy. At a conceptual level, the Detect API only finds objects and living things, while the Tag API can also include contextual terms like \"indoor\", which can't be localized with bounding boxes. Reference: https://azure.microsoft.com/en-us/services/cognitive-services/face/ https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/concept-object- detection","images":[{"src":"assets/exams/ai-900/pdf-page-88-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You need to determine the location of cars in an image so that you can estimate the distance between the cars. Which type of computer vision should you use?","options":["optical character recognition (OCR)","object detection","image classification","face detection"],"correctIndex":1},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Azure Custom Vision is a cognitive service that lets you build, deploy, and improve your own image classifiers. An image classifier is an AI service that applies labels (which represent classes) to images, according to their visual characteristics. Unlike the Computer Vision service, Custom Vision allows you to specify the labels to apply. Note: The Custom Vision service uses a machine learning algorithm to apply labels to images. You, the developer, must submit groups of images that feature and lack the characteristics in question. You label the images yourself at the time of submission. Then the algorithm trains to this data and calculates its own accuracy by testing itself on those same images. Once the algorithm is trained, you can test, retrain, and eventually use it to classify new images according to the needs of your app. You can also export the model itself for offline use. Incorrect Answers: Computer Vision: Azure's Computer Vision service provides developers with access to advanced algorithms that process images and return information based on the visual features you're interested in. For example, Computer Vision can determine whether an image contains adult content, find specific brands or objects, or find human faces. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/custom-vision-service/home","images":[{"src":"assets/exams/ai-900/pdf-page-90-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You send an image to a Computer Vision API and receive back the annotated image shown in the exhibit. Which type of computer vision was used?","options":["object detection","face detection","optical character recognition (OCR)","image classification"],"correctIndex":0},{"prompt":"What are two tasks that can be performed by using the Computer Vision service? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["Train a custom image classification model.","Detect faces in an image.","Recognize handwritten text.","Translate the text in an image between languages."],"correctIndices":[1,2],"explanation":"B: Azure's Computer Vision service provides developers with access to advanced algorithms that process images and return information based on the visual features you're interested in. For example, Computer Vision can determine whether an image contains adult content, find specific brands or objects, or find human faces. C: Computer Vision includes Optical Character Recognition (OCR) capabilities. You can use the new Read API to extract printed and handwritten text from images and documents. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/home"},{"prompt":"What is a use case for classification?","options":["predicting how many cups of coffee a person will drink based on how many hours the person slept the previous night.","analyzing the contents of images and grouping images that have similar colors","predicting whether someone uses a bicycle to travel to work based on the distance from home to work","predicting how many minutes it will take someone to run a race based on past race times"],"correctIndex":2},{"prompt":"What are two tasks that can be performed by using computer vision? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["Predict stock prices.","Detect brands in an image.","Detect the color scheme in an image","Translate text between languages.","Extract key phrases."],"correctIndex":1},{"prompt":"You need to build an image tagging solution for social media that tags images of your friends automatically. Which Azure Cognitive Services service should you use?","options":["Face","Form Recognizer","Text Analytics","Computer Vision"],"correctIndex":0},{"prompt":"A historian can use ________ to digitize newspaper articles. Select the answer that correctly completes the sentence.","options":["Object detection","Facial recognition","Image classification","Optical character recognition (OCR)"],"correctIndex":3},{"prompt":"DRAG DROP Match the facial recognition tasks to the appropriate questions. To answer, drag the appropriate task from the column on the left to its question on the right. Each task may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: verification Identity verification Modern enterprises and apps can use the Face identification and Face verification operations to verify that a user is who they claim to be. Box 2: similarity The Find Similar operation does face matching between a target face and a set of candidate faces, finding a smaller set of faces that look similar to the target face. This is useful for doing a face search by image. The service supports two working modes, matchPerson and matchFace. The matchPerson mode returns similar faces after filtering for the same person by using the Verify API. The matchFace mode ignores the same-person filter. It returns a list of similar candidate faces that may or may not belong to the same person. Box 3: identification Face identification can address \"one-to-many\" matching of one face in an image to a set of faces in a secure repository. Match candidates are returned based on how closely their face data matches the query face. This scenario is used in granting building or airport access to a certain group of people or verifying the user of a device. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/face/overview","images":[{"src":"assets/exams/ai-900/pdf-page-95-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"Which Computer Vision feature can you use to generate automatic captions for digital photographs?","options":["Recognize text.","Identify the areas of interest.","Detect objects.","Describe the images."],"correctIndex":3},{"prompt":"Which service should you use to extract text, key/value pairs, and table data automatically from scanned documents?","options":["Custom Vision","Face","Form Recognizer","Language"],"correctIndex":2},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Handwriting OCR (optical character recognition) is the process of automatically extracting handwritten information from paper, scans and other low-quality digital documents. Reference: https://vidado.ai/handwriting-ocr","images":[{"src":"assets/exams/ai-900/pdf-page-97-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Image classification is a popular area of artificial intelligence. One application of image classification that’s already being used in industry is the detection of quality issues on assembly lines during manufacturing. In a typical production line, components travel down the assembly line from one station to another, at the end of which an inspector steps in to look for problems— a manual and error-prone process. AI-driven image classification reduces human effort and automatically classifies images as pass or fail. This improves not only the efficiency of the human operators in the validation process, but also the quality of the overall manufacturing process. Box 2: Yes Object detection is similar to tagging, but the API returns the bounding box coordinates (in pixels) for each object found in the image. For example, if an image contains a dog, cat and person, the Detect operation will list those objects with their coordinates in the image. You can use this functionality to process the relationships between the objects in an image. It also lets you determine whether there are multiple instances of the same object in an image. Box 3: No Reference: https://azure.microsoft.com/en-us/use-cases/defect-detection-with-image-analysis/ https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/concept-object- detection","images":[{"src":"assets/exams/ai-900/pdf-page-98-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-98-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-98-img-2.jpg","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"You need to create a model that labels a collection of your personal digital photographs. Which Azure Cognitive Services service should you use?","options":["Form Recognizer","Custom Vision","Language","Computer Vision"],"correctIndex":3},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Original exam UI used an image or drag-and-drop; only coordinates were embedded in the source file. Expand “Show answer” if a reference URL or boxed answer appears below."},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Box 1: Facial analysis. In another change, we [Microsoft] will retire facial analysis capabilities that purport to infer emotional states and identity attributes such as gender, age, smile, facial hair, hair, and makeup. We collaborated with internal and external researchers to understand the limitations and potential benefits of this technology and navigate the tradeoffs. In the case of emotion classification specifically, these efforts raised important questions about privacy, the lack of consensus on a definition of “emotions,” and the inability to generalize the linkage between facial expression and emotional state across use cases, regions, and demographics. API access to capabilities that predict sensitive attributes also opens up a wide range of ways they can be misused — including subjecting people to stereotyping, discrimination, or unfair denial of services. Reference: https://azure.microsoft.com/en-us/blog/responsible-ai-investments-and-safeguards- for-facial-recognition/300","images":[{"src":"assets/exams/ai-900/pdf-page-100-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-100-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-100-img-2.jpg","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the Azure Cognitive Services to the appropriate actions. To answer, drag the appropriate service from the column on the left to its action on the right. Each service may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Custom Vision Azure Custom Vision is an image recognition service that lets you build, deploy, and improve your own image identifier models. An image identifier applies labels to images, according to their visual characteristics. Each label represents a classification or object. Box 2:
