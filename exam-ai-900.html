Form Recognizer Box 3: Face Reference: https://learn.microsoft.com/en-us/azure/cognitive-services/custom-vision- service/overview","images":[{"src":"assets/exams/ai-900/pdf-page-101-img-0.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT Select the answer that correctly completes the sentence.","options":[],"explanation":"Box 1: detection. Attributes are a set of features that can optionally be detected by the Face - Detect API. The following attributes can be detected: * Exposure. The exposure of the face in the image. This attribute returns a value between zero and one and an informal rating of underExposure, goodExposure, or overExposure. * Noise. The visual noise detected in the face image. This attribute returns a value between zero and one and an informal rating of low, medium, or high. * Occlusion. Whether there are objects blocking parts of the face. This attribute returns a Boolean value for eyeOccluded, foreheadOccluded, and mouthOccluded. * Etc. Reference: https://learn.microsoft.com/en-us/azure/cognitive-services/computer-vision/concept- face-detection","images":[{"src":"assets/exams/ai-900/pdf-page-102-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-102-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Your company manufactures widgets. You have 1,000 digital photos of the widgets. You need to identify the location of the widgets within the photos. What should you use?","options":["Computer Vision Spatial Analysis","Custom Vision object detection","Computer Vision Image Analysis","Custom Vision classification"],"correctIndex":1},{"prompt":"Natural language processing can be used to __________. Select the answer that correctly completes the sentence.","options":["Analyze video content","Generate speech","Classify email messages as work-related or personal.","Classify images"],"correctIndex":2},{"prompt":"You are developing a solution that uses the Text Analytics service. You need to identify the main talking points in a collection of documents. Which type of natural language processing should you use?","options":["entity recognition","key phrase extraction","sentiment analysis","language detection"],"correctIndex":1},{"prompt":"In which two scenarios can you use speech recognition? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["an in-car system that reads text messages aloud","providing closed captions for recorded or live videos","creating an automated public address system for a train station","creating a transcript of a telephone call or meeting"],"correctIndex":1},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Reference: https://azure.microsoft.com/en-gb/services/cognitive-services/speech-to-text/#features","images":[{"src":"assets/exams/ai-900/pdf-page-106-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You need to build an app that will read recipe instructions aloud to support users who have reduced vision. Which version service should you use?","options":["Text Analytics","Translator","Speech","Language Understanding (LUIS)"],"correctIndex":2},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-gb/azure/cognitive-services/text-analytics/overview https://azure.microsoft.com/en-gb/services/cognitive-services/speech-services/","images":[{"src":"assets/exams/ai-900/pdf-page-107-img-0.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"Your website has a chatbot to assist customers. You need to detect when a customer is upset based on what the customer types in the chatbot. Which type of AI workload should you use?","options":["anomaly detection","computer vision","regression","natural language processing"],"correctIndex":3},{"prompt":"You plan to develop a bot that will enable users to query a knowledge base by using natural language processing. Which two services should you include in the solution? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["QnA Maker","Azure Bot Service","Form Recognizer","Anomaly Detector"],"correctIndex":0},{"prompt":"In which two scenarios can you use a speech synthesis solution? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["an automated voice that reads back a credit card number entered into a telephone by using a numeric keypad","generating live captions for a news broadcast","extracting key phrases from the audio recording of a meeting","an AI character in a computer game that speaks audibly to a player"],"correctIndices":[0,3],"explanation":"Azure Text to Speech is a Speech service feature that converts text to lifelike speech. Incorrect Answers: C: Extracting key phrases is not speech synthesis. Reference: https://azure.microsoft.com/en-in/services/cognitive-services/text-to-speech/"},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"The translator service provides multi-language support for text translation, transliteration, language detection, and dictionaries. Speech-to-Text, also known as automatic speech recognition (ASR), is a feature of Speech Services that provides transcription. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/Translator/translator-info-overview https://docs.microsoft.com/en-us/legal/cognitive-services/speech-service/speech-to- text/transparency-note"},{"prompt":"DRAG DROP You need to scan the news for articles about your customers and alert employees when there is a negative article. Positive articles must be added to a press book. Which natural language processing tasks should you use to complete the process? To answer, drag the appropriate tasks to the correct locations. Each task may be used once, more than once, or not at all. You may need to drag the split bar between panes or scroll to view content. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Entity recognition the Named Entity Recognition module in Machine Learning Studio (classic), to identify the names of things, such as people, companies, or locations in a column of text. Named entity recognition is an important area of research in machine learning and natural language processing (NLP), because it can be used to answer many real-world questions, such as: • Which companies were mentioned in a news article? • Does a tweet contain the name of a person? Does the tweet also provide his current location? • Were specified products mentioned in complaints or reviews? Box 2: Sentiment Analysis The Text Analytics API's Sentiment Analysis feature provides two ways for detecting positive and negative sentiment. If you send a Sentiment Analysis request, the API will return sentiment labels (such as \"negative\", \"neutral\" and \"positive\") and confidence scores at the sentence and document-level. Reference: https://docs.microsoft.com/en-us/azure/machine-learning/studio-module-reference/named-entity- recognition https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/how-tos/text-analytics- how-to-sentiment-analysis","images":[{"src":"assets/exams/ai-900/pdf-page-111-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-111-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-112-img-0.png","alt":"Exam figure 3","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-112-img-1.png","alt":"Exam figure 4","caption":"Answer area"}]},{"prompt":"You are building a knowledge base by using QnA Maker. Which file format can you use to populate the knowledge base?","options":["PPTX","XML","ZIP","PDF"],"correctIndex":3},{"prompt":"In which scenario should you use key phrase extraction?","options":["identifying whether reviews of a restaurant are positive or negative","generating captions for a video based on the audio track","identifying which documents provide information about the same topics","translating a set of documents from English to German"],"correctIndex":2},{"prompt":"You have insurance claim reports that are stored as text. You need to extract key terms from the reports to generate summaries. Which type of AI workload should you use?","options":["natural language processing","conversational AI","anomaly detection","computer vision"],"correctIndex":0},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"Natural language processing (NLP) is used for tasks such as sentiment analysis, topic detection, language detection, key phrase extraction, and document categorization. Reference: https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/natural- language-processing"},{"prompt":"Which AI service can you use to interpret the meaning of a user input such as “Call me back later?”","options":["Translator","Text Analytics","Speech","Language Understanding (LUIS)"],"correctIndex":3},{"prompt":"You are developing a chatbot solution in Azure. Which service should you use to determine a user’s intent?","options":["Translator","QnA Maker","Speech","Language Understanding (LUIS)"],"correctIndex":3},{"prompt":"You need to make the written press releases of your company available in a range of languages. Which service should you use?","options":["Translator","Text Analytics","Speech","Language Understanding (LUIS)"],"correctIndex":0},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"The Text Analytics API is a cloud-based service that provides advanced natural language processing over raw text, and includes four main functions: sentiment analysis, key phrase extraction, named entity recognition, and language detection. Box 1: Yes You can detect which language the input text is written in and report a single language code for every document submitted on the request in a wide range of languages, variants, dialects, and some regional/cultural languages. The language code is paired with a score indicating the strength of the score. Box 2: No Box 3: Yes Named Entity Recognition: Identify and categorize entities in your text as people, places, organizations, date/time, quantities, percentages, currencies, and more. Well-known entities are also recognized and linked to more information on the web. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/text-analytics/overview","images":[{"src":"assets/exams/ai-900/pdf-page-117-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-117-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP Match the types of natural languages processing workloads to the appropriate scenarios. To answer, drag the appropriate workload type from the column on the left to its scenario on the right. Each workload type may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Entity recognition Named Entity Recognition (NER) is the ability to identify different entities in text and categorize them into pre-defined classes or types such as: person, location, event, product, and organization. Box 2: Sentiment analysis Sentiment Analysis is the process of determining whether a piece of writing is positive, negative or neutral. Box 3: Translation Using Microsoft’s Translator text API This versatile API from Microsoft can be used for the following: Translate text from one language to another. Transliterate text from one script to another. Detecting language of the input text. Find alternate translations to specific text. Determine the sentence length. Reference: https://docs.microsoft.com/en-in/azure/cognitive-services/text-analytics/how-tos/text-analytics- how-to-entity-linking?tabs=version-3-preview https://azure.microsoft.com/en-us/services/cognitive-services/text-analytics","images":[{"src":"assets/exams/ai-900/pdf-page-118-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Content Moderator is part of Microsoft Cognitive Services allowing businesses to use machine assisted moderation of text, images, and videos that augment human review. The text moderation capability now includes a new machine-learning based text classification feature which uses a trained model to identify possible abusive, derogatory or discriminatory language such as slang, abbreviated words, offensive, and intentionally misspelled words for review. Box 2: No Azure's Computer Vision service gives you access to advanced algorithms that process images and return information based on the visual features you're interested in. For example, Computer Vision can determine whether an image contains adult content, find specific brands or objects, or find human faces. Box 3: Yes Natural language processing (NLP) is used for tasks such as sentiment analysis, topic detection, language detection, key phrase extraction, and document categorization. Sentiment Analysis is the process of determining whether a piece of writing is positive, negative or neutral. Reference: https://azure.microsoft.com/es-es/blog/machine-assisted-text-classification-on-content- moderator-public-preview/ https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/natural- language-processing","images":[{"src":"assets/exams/ai-900/pdf-page-119-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-120-img-0.png","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-120-img-1.jpg","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"You are developing a natural language processing solution in Azure. The solution will analyze customer reviews and determine how positive or negative each review is. This is an example of which type of natural language processing workload?","options":["language detection","sentiment analysis","key phrase extraction","entity recognition"],"correctIndex":1},{"prompt":"You use natural language processing to process text from a Microsoft news story. You receive the output shown in the following exhibit. Which type of natural languages processing was performed?","options":["entity recognition","key phrase extraction","sentiment analysis","translation"],"correctIndex":0},{"prompt":"DRAG DROP You plan to apply Text Analytics API features to a technical support ticketing system. Match the Text Analytics API features to the appropriate natural language processing scenarios. To answer, drag the appropriate feature from the column on the left to its scenario on the right. Each feature may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box1: Sentiment analysis Sentiment Analysis is the process of determining whether a piece of writing is positive, negative or neutral. Box 2: Broad entity extraction Broad entity extraction: Identify important concepts in text, including key Key phrase extraction/ Broad entity extraction: Identify important concepts in text, including key phrases and named entities such as people, places, and organizations. Box 3: Entity Recognition Named Entity Recognition: Identify and categorize entities in your text as people, places, organizations, date/time, quantities, percentages, currencies, and more. Well-known entities are also recognized and linked to more information on the web. Reference: https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology-choices/natural- language-processing https://azure.microsoft.com/en-us/services/cognitive-services/text-analytics","images":[{"src":"assets/exams/ai-900/pdf-page-122-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-123-img-0.png","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-123-img-1.png","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"You are authoring a Language Understanding (LUIS) application to support a music festival. You want users to be able to ask questions about scheduled shows, such as: “Which act is playing on the main stage?” The question “Which act is playing on the main stage?” is an example of which type of element?","options":["an intent","an utterance","a domain","an entity"],"correctIndex":1},{"prompt":"You build a QnA Maker bot by using a frequently asked questions (FAQ) page. You need to add professional greetings and other responses to make the bot more user friendly. What should you do?","options":["Increase the confidence threshold of responses","Enable active learning","Create multi-turn questions","Add chit-chat"],"correctIndex":3},{"prompt":"You need to develop a chatbot for a website. The chatbot must answer users’ questions based on the information in the following documents: • A product troubleshooting guide in a Microsoft Word document • A frequently asked questions (FAQ) list on a webpage Which service should you use to process the documents?","options":["Azure Bot Service","Language Understanding","Text Analytics","QnA Maker"],"correctIndex":3},{"prompt":"You are building a Language Understanding model for an e-commerce business. You need to ensure that the model detects when utterances are outside the intended scope of the model. What should you do?","options":["Test the model by using new utterances","Add utterances to the None intent","Create a prebuilt task entity","Create a new model"],"correctIndex":1},{"prompt":"Which two scenarios are examples of a natural language processing workload? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["monitoring the temperature of machinery to turn on a fan when the temperature reaches a specific threshold","a smart device in the home that responds to questions such as, \"What will the weather be like today?\"","a website that uses a knowledge base to interactively respond to users' questions","assembly line machinery that autonomously inserts headlamps into cars"],"correctIndices":[1,2],"explanation":"Natural language processing (NLP) is used for tasks such as sentiment analysis, topic detection, language detection, key phrase extraction, and document categorization. Reference: https://docs.microsoft.com/en-us/azure/architecture/data-guide/technology- choices/natural-language-processing"},{"prompt":"You have an AI solution that provides users with the ability to control smart devices by using verbal commands. Which two types of natural language processing (NLP) workloads does the solution use? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["text-to-speech","key phrase extraction","speech-to-text","language modeling","translation"],"correctIndices":[1,2],"explanation":"Key phrase extraction is one of the features offered by Azure Cognitive Service for Language, a collection of machine learning and AI algorithms in the cloud for developing intelligent applications that involve written language. Use key phrase extraction to quickly identify the main concepts in text. For example, in the text \"The food was delicious and the staff were wonderful.\", key phrase extraction will return the main topics: \"food\" and \"wonderful staff\". Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/language-service/key- phrase-extraction/overview"},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Azure Cognitive Service for Language provides features including: * Language detection: This pre-configured feature evaluates text, and determines the language it was written in. It returns a language identifier and a score that indicates the strength of the analysis. Box 2: No Handwritten detection is part of OCR (Optical Character Recognition). Box 3: Yes Azure Cognitive Service for Language provides features including: * Named Entity Recognition (NER): This pre-configured feature identifies entities in text across several pre-defined categories. Note: Named entity recognition is a natural language processing technique that can automatically scan entire articles and pull out some fundamental entities in a text and classify them into predefined categories. Entities may be, Organizations, Quantities, Monetary values, Percentages, and more. People’s names Company names Geographic locations (Both physical and political) Product names Dates and times Amounts of money Names of events Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/language-service/overview","images":[{"src":"assets/exams/ai-900/pdf-page-127-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-127-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"DRAG DROP You plan to use Azure Cognitive Services to develop a voice controlled personal assistant app. Match the Azure Cognitive Services to the appropriate tasks. To answer, drag the appropriate service from the column on the left to its description on the right. Each service may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Speech The Speech service provides speech-to-text and text-to-speech capabilities with an Azure Speech resource. You can transcribe speech to text with high accuracy, produce natural-sounding text- to-speech voices, translate spoken audio, and use speaker recognition during conversations. Box 2: Language service Build applications with conversational language understanding, a Cognitive Service for Language feature that understands natural language to interpret user goals and extracts key information from conversational phrases. Create multilingual, customizable intent classification and entity extraction models for your domain-specific keywords or phrases across 96 languages. Box 3: Speech Incorrect: Not Translator text: Text translation is a cloud-based REST API feature of the Translator service that uses neural machine translation technology to enable quick and accurate source-to-target text translation in real time across all supported languages. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/overview https://azure.microsoft.com/en-us/services/cognitive-services/conversational-language- understanding/ https://docs.microsoft.com/en-us/azure/cognitive-services/translator/text-translation-overview","images":[{"src":"assets/exams/ai-900/pdf-page-128-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You need to make the written press releases of your company available in a range of languages. Which service should you use?","options":["Speech","Language","Translator","Personalizer"],"correctIndex":2},{"prompt":"You have insurance claim reports that are stored as text. You need to extract key terms from the reports to generate summaries. Which type of AI workload should you use?","options":["anomaly detection","natural language processing","computer vision","knowledge mining"],"correctIndex":1},{"prompt":"You need to build an app that will read recipe instructions aloud to support users who have reduced vision. Which version service should you use?","options":["Language service","Translator","Speech","Personalizer"],"correctIndex":2},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: No From is set to Italian, not English. Box 2: Yes It's possible to translate to multiple languages simultaneously by repeating the parameter in the query string. For example, use to=de&to=it to translate to German and Italian. Box 3: Yes Document Translation is a cloud-based feature of the Azure Translator service. The Document Translation API enables the translation of whole documents while preserving source document structure and text formatting. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/translator/reference/v3-0- translate https://docs.microsoft.com/en-us/azure/cognitive-services/translator/document-translation/get- started-with-document-translation","images":[{"src":"assets/exams/ai-900/pdf-page-131-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-131-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"An app that analyzes social media posts to identify their tone is an example of which type of natural language processing (NLP) workload?","options":["sentiment analysis","speech recognition","key phrase extraction","entity recognition"],"correctIndex":0},{"prompt":"You are building a chatbot that will use natural language processing (NLP) to perform the following actions based on the text input of a user. • Accept customer orders. • Retrieve support documents. • Retrieve order status updates. Which type of NLP should you use?","options":["sentiment analysis","named entity recognition","translation","language modeling"],"correctIndex":1},{"prompt":"DRAG DROP Match the Azure Cognitive Services service to the appropriate actions. To answer, drag the appropriate service from the column on the left to its action on the right. Each service may be used once, more than once, or not at all. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Speech Custom Speech: Code-free automated machine learning for speech recognition Speech to text is a Speech service feature that accurately transcribes spoken audio to text. Make spoken audio actionable Quickly and accurately transcribe audio to text in more than 100 languages and variants. Customize models to enhance accuracy for domain-specific terminology. Get more value from spoken audio by enabling search or analytics on transcribed text or facilitating action—all in your preferred programming language. Box 2: Language service Add intents to your LUIS app to identify groups of questions or commands that have the same intention. Note: Language understanding (LU) is a very centric component to enable conversational services such as bots, IoT experiences, analytics, and others. In a spoken dialog system, LU converts from the words in a sentence into a machine-readable meaning representation, typically indicating the intent of the sentence and any present entities. For example, consider a physical ﬁtness domain, with a dialog system embedded in a wearable device like a watch. This dialog system could recognize intents like StartActivity and StopActivity, and could recognize entities like ActivityType. In the user input “begin a jog”, the goal of LU is to identify the intent as StartActivity, and identify the entity ActivityType= ’’jog’’. Box 3: Language service Intent compared to entity The intent represents the action the application should take for the user, based on the entire utterance. An utterance can have only one top-scoring intent, but it can have many entities. Create an intent when the user's intention would trigger an action in your client application, like a call to the checkweather() function from the table above. Then create entities to represent parameters required to execute the action. Reference: https://azure.microsoft.com/en-us/services/cognitive-services/speech-to-text https://azure.microsoft.com/en-us/blog/luis-ai-automated-machine-learning-for-custom- language-understanding/ https://docs.microsoft.com/en-us/azure/cognitive-services/luis/concepts/intents","images":[{"src":"assets/exams/ai-900/pdf-page-133-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-133-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes The Bot Framework Web Chat component is a highly customizable web-based client for the Bot Framework V4 SDK. The Bot Framework SDK v4 enables developers to model conversation and build sophisticated bot applications. Box 2: Yes Captioning is the process of converting the audio content of a television broadcast, webcast, film, video, live event, or other production into text, and then displaying the text on a screen, monitor, or other visual display system. Concepts include how to synchronize captions with your input audio, apply profanity filters, get partial results, apply customizations, and identify spoken languages for multilingual scenarios. Box 3: Yes Natural language processing supports applications that can see, hear, speak with, and understand users. Using text analytics, translation, and language understanding services, Microsoft Azure makes it easy to build applications that support natural language. Reference: https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-webchat- overview?view=azure-bot-service-4.0 https://docs.microsoft.com/en-us/azure/cognitive-services/speech-service/captioning- concepts?pivots=programming-language-csharp https://docs.microsoft.com/en-us/learn/paths/explore-natural-language-processing/","images":[{"src":"assets/exams/ai-900/pdf-page-134-img-0.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You have a website that includes customer reviews. You need to store the reviews in English and present the reviews to users in their respective language by recognizing each user's geographical location. Which type of natural language processing workload should you use?","options":["key phrase extraction","speech recognition","language modeling","translation"],"correctIndex":0},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Original exam UI used an image or drag-and-drop; only coordinates were embedded in the source file. Expand “Show answer” if a reference URL or boxed answer appears below.","images":[{"src":"assets/exams/ai-900/pdf-page-136-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Box 2: Yes Box 3: No","images":[{"src":"assets/exams/ai-900/pdf-page-136-img-1.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You have a custom question answering solution. You create a bot that uses the knowledge base to respond to customer requests. You need to identify what the bot can perform without adding additional skills. What should you identify?","options":["Register customer purchases.","Register customer complaints.","Answer questions from multiple users simultaneously.","Provide customers with return materials authorization (RMA) numbers."],"correctIndex":2},{"prompt":"You have a solution that analyzes social media posts to extract the mentions of city names and the city names discussed most frequently. Which type of natural language processing (NLP) workload does the solution use?","options":["speech recognition","sentiment analysis","key phrase extraction","entity recognition"],"correctIndex":2},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: No Box 2: Yes Create a conversational question-and-answer layer over your existing data with question answering, an Azure Cognitive Service for Language feature. Build a knowledge base by adding unstructured documents or extracting questions and answers from your semi-structured content, including FAQ, manuals, and documents. Get the best answers from the questions and answers in your knowledge base automatically. Your knowledge base gets smarter, too, as it continually learns from user behavior. Box 3: No For Intent recognition use the Speech and Language Understanding (LUIS) services, which enables real-time transcription of audio streams into text, while identifying intent and entities. Note: Question answering provides cloud-based Natural Language Processing (NLP) that allows you to create a natural conversational layer over your data. It is used to find the most appropriate answer for any input from your custom knowledge base (KB) of information. Question answering is commonly used to build conversational client applications, which include social media applications, chat bots, and speech-enabled desktop applications. Several new features have been added including enhanced relevance using a deep learning ranker, precise answers, and end-to-end region support. Question answering comprises of two capabilities: Custom question answering: Using these capability users can customize different aspects like edit question and answer pairs extracted from the content source, define synonyms and metadata, accept question suggestions etc. Prebuilt question answering: This capability allows users to get a response by querying a text passage without having the need to manage knowledgebases. Reference: https://azure.microsoft.com/en-us/products/cognitive-services/question- answering/#overview https://learn.microsoft.com/en-us/azure/cognitive-services/language-service/question- answering/overview Topic 5, Describe features of conversational AI workloads on Azure","images":[{"src":"assets/exams/ai-900/pdf-page-139-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-139-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You have a webchat bot that provides responses from a QnA Maker knowledge base. You need to ensure that the bot uses user feedback to improve the relevance of the responses over time. What should you use?","options":["key phrase extraction","sentiment analysis","business logic","active learning"],"correctIndex":3},{"prompt":"You are developing a conversational AI solution that will communicate with users through multiple channels including email, Microsoft Teams, and webchat. Which service should you use?","options":["Text Analytics","Azure Bot Service","Translator","Form Recognizer"],"correctIndex":1},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/bot-service/bot-service-overview- introduction?view=azure-bot-service-4.0","images":[{"src":"assets/exams/ai-900/pdf-page-141-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You need to provide content for a business chatbot that will help answer simple user queries. What are three ways to create question and answer text by using QnA Maker? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["Generate the questions and answers from an existing webpage.","Use automated machine learning to train a model based on a file that contains the questions.","Manually enter the questions and answers.","Connect the bot to the Cortana channel and ask questions by using Cortana.","Import chit-chat content from a predefined data source."],"correctIndices":[0,2,4],"explanation":"Automatic extraction Extract question-answer pairs from semi-structured content, including FAQ pages, support websites, excel files, SharePoint documents, product manuals and policies. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/qnamaker/concepts/content-types"},{"prompt":"You have a frequently asked questions (FAQ) PDF file. You need to create a conversational support system based on the FAQ. Which service should you use?","options":["QnA Maker","Text Analytics","Computer Vision","Language Understanding (LUIS)"],"correctIndex":0},{"prompt":"You need to reduce the load on telephone operators by implementing a chatbot to answer simple questions with predefined answers. Which two AI service should you use to achieve the goal? Each correct answer presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Text Analytics","QnA Maker","Azure Bot Service","Translator"],"correctIndices":[1,2],"explanation":"Bots are a popular way to provide support through multiple communication channels. You can use the QnA Maker service and Azure Bot Service to create a bot that answers user questions. Reference: https://docs.microsoft.com/en-us/learn/modules/build-faq-chatbot-qna-maker-azure-bot-service/"},{"prompt":"Which two scenarios are examples of a conversational AI workload? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["a smart device in the home that responds to questions such as “What will the weather be like today?”","a website that uses a knowledge base to interactively respond to users’ questions","assembly line machinery that autonomously inserts headlamps into cars","monitoring the temperature of machinery to turn on a fan when the temperature reaches a specific threshold"],"correctIndices":[0,1]},{"prompt":"You have the process shown in the following exhibit. Which type of AI solution is shown in the diagram?","options":["a sentiment analysis solution","a chatbot","a machine learning model","a computer vision application"],"correctIndex":1},{"prompt":"You need to develop a web-based AI solution for a customer support system. Users must be able to interact with a web app that will guide them to the best resource or answer. Which service should you use?","options":["Custom Vision","QnA Maker","Translator Text","Face"],"correctIndex":1},{"prompt":"Which AI service should you use to create a bot from a frequently asked questions (FAQ) document?","options":["QnA Maker","Language Understanding (LUIS)","Text Analytics","Speech"],"correctIndex":0},{"prompt":"HOTSPOT To complete the sentence, select the appropriate option in the answer area.","options":[],"explanation":"With Microsoft’s Conversational AI tools developers can build, connect, deploy, and manage intelligent bots that naturally interact with their users on a website, app, Cortana, Microsoft Teams, Skype, Facebook Messenger, Slack, and more. Reference: https://azure.microsoft.com/en-in/blog/microsoft-conversational-ai-tools-enable-developers-to- build-connect-and-manage-intelligent-bots","images":[{"src":"assets/exams/ai-900/pdf-page-146-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-146-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Which scenario is an example of a webchat bot?","options":["Determine whether reviews entered on a website for a concert are positive or negative, and then add a thumbs up or thumbs down emoji to the reviews.","Translate into English questions entered by customers at a kiosk so that the appropriate person can call the customers back.","Accept questions through email, and then route the email messages to the correct person based on the content of the message.","From a website interface, answer common questions about scheduled events and ticket purchases for a music festival."],"correctIndex":3},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-gb/azure/cognitive-services/qnamaker/concepts/data-sources-and- content https://docs.microsoft.com/en-us/azure/cognitive-services/luis/choose-natural-language- processing-service","images":[{"src":"assets/exams/ai-900/pdf-page-147-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/bot-service/bot-service-manage-channels?view=azure- bot-service-4.0","images":[{"src":"assets/exams/ai-900/pdf-page-148-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-148-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/bot-service/bot-service-overview- introduction?view=azure-bot-service-4.0","images":[{"src":"assets/exams/ai-900/pdf-page-149-img-0.jpg","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-149-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"Which two scenarios are examples of a conversational AI workload? Each correct answer presents a complete solution. NOTE: Each correct selection is worth one point.","options":["a telephone answering service that has a pre-recorder message","a chatbot that provides users with the ability to find answers on a website by themselves","telephone voice menus to reduce the load on human resources","a service that creates frequently asked questions (FAQ) documents by crawling public websites"],"correctIndices":[1,2],"explanation":"B: A bot is an automated software program designed to perform a particular task. Think of it as a robot without a body. C: Automated customer interaction is essential to a business of any size. In fact, 61% of consumers prefer to communicate via speech, and most of them prefer self-service. Because customer satisfaction is a priority for all businesses, self-service is a critical facet of any customer-facing communications strategy. Incorrect Answers: D: Early bots were comparatively simple, handling repetitive and voluminous tasks with relatively straightforward algorithmic logic. An example would be web crawlers used by search engines to automatically explore and catalog web content. Reference: https://docs.microsoft.com/en-us/azure/architecture/data-guide/big-data/ai-overview https://docs.microsoft.com/en-us/azure/architecture/solution-ideas/articles/interactive-voice- response-bot"},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes Azure bot service can be integrated with the powerful AI capabilities with Azure Cognitive Services. Box 2: Yes Azure bot service engages with customers in a conversational manner. Box 3: No The QnA Maker service creates knowledge base, not question and answers sets. Note: You can use the QnA Maker service and a knowledge base to add question-and-answer support to your bot. When you create your knowledge base, you seed it with questions and answers. Reference: https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-tutorial-add-qna","images":[{"src":"assets/exams/ai-900/pdf-page-151-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-151-img-1.png","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Reference: https://docs.microsoft.com/en-us/azure/architecture/reference-architectures/ai/conversational-bot https://docs.microsoft.com/en-us/azure/bot-service/bot-builder-webchat-overview?view=azure- bot-service-4.0","images":[{"src":"assets/exams/ai-900/pdf-page-152-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You have a knowledge base of frequently asked questions (FAQ). You create a bot that uses the knowledge base to respond to customer requests. You need to identify what the bot can perform without adding additional skills. What should you identify?","options":["Register customer purchases.","Register customer complaints.","Answer questions from multiple users simultaneously.","Provide customers with return materials authorization (RMA) numbers."],"correctIndex":2},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: Yes You can create and build a cortana bot using microsoft bot framework. Note: Connect Cortana Channels Login to Azure portal > Select the “All Resources” > Select Channels > Select Cortana icon. Let us start to configure the “Cortana “Channel and follow the below steps, at the end of this article you will be able to deploy the Bot into the Cortana. Etc. Box 2: Yes QnA Maker is an easy-to-use web-based service that makes it easy to power a question-answer application or chatbot from semi-structured content like FAQ documents and product manuals. With QnA Maker, developers can build, train, and publish question and answer bots in minutes. Box 3: Yes Reference: https://www.c-sharpcorner.com/article/create-and-build-a-cortana-bot-using- microsoft-bot-framework/","images":[{"src":"assets/exams/ai-900/pdf-page-153-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-154-img-0.jpg","alt":"Exam figure 2","caption":"Answer area"},{"src":"assets/exams/ai-900/pdf-page-154-img-1.jpg","alt":"Exam figure 3","caption":"Answer area"}]},{"prompt":"HOTSPOT For each of the following statements, select Yes if the statement is true. Otherwise, select No. NOTE: Each correct selection is worth one point.","options":[],"explanation":"Box 1: No Build conversational experiences with Power Virtual Agents and Azure Bot Service Azure Bot Service provides an integrated development environment for bot building. Its integration with Power Virtual Agents, a fully hosted low-code platform, enables developers of all technical abilities build conversational AI bots—no code needed. Box 2: Yes Box 3: Yes You can configure your bot to communicate with people via Microsoft Teams. Reference: https://azure.microsoft.com/en-us/services/bot-services/#overview https://docs.microsoft.com/en-us/azure/bot-service/channel-connect-teams","images":[{"src":"assets/exams/ai-900/pdf-page-155-img-0.png","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"HOTSPOT Select the answer that correctly You need to create a customer support solution to help customers access information. The solution must support email, phone, and live chat channels. Which type of Al solution should you use? 0 A. machine learning 0 B. computer vision C. chatbot 0 D. natural language processing (NLP)","options":[],"explanation":"Azure's Computer Vision service gives you access to advanced algorithms that process images and return information based on the visual features you're interested in. * Optical Character Recognition (OCR) * Spatial Analysis * Image Analysis The Image Analysis service extracts many visual features from images, such as objects, faces, adult content, and auto-generated text descriptions. Follow the Image Analysis quickstart to get started. Reference: https://docs.microsoft.com/en-us/azure/cognitive-services/computer-vision/overview","images":[{"src":"assets/exams/ai-900/pdf-page-155-img-1.jpg","alt":"Exam figure 1","caption":"Figure"}]},{"prompt":"You have an Azure Machine Learning pipeline that contains a Split Data module. The Split Data module outputs to a Train Model module and a Score Model module. What is the function of the Split Data module?","options":["scaling numeric variables so that they are within a consistent numeric range","creating training and validation datasets","diverting records that have missing data","selecting columns that must be included in the model"],"correctIndex":1},{"prompt":"Which statement is an example of a Microsoft responsible AI principle?","options":["AI systems must use only publicly available data","AI systems must be transparent and inclusive","AI systems must keep personal details public","AI systems must protect the interests of the company"],"correctIndex":1},{"prompt":"DRAG DROP Match the types of natural language processing workloads to the appropriate scenarios. To answer, drag the appropriate workload type from the column on the left to its scenario on the right. Each workload type may be used once, more than once, or not at all. NOTE: Each correct match is worth one point.","options":[],"explanation":"Original exam UI used an image or drag-and-drop; only coordinates were embedded in the source file. Expand “Show answer” if a reference URL or boxed answer appears below.","images":[{"src":"assets/exams/ai-900/pdf-page-157-img-0.png","alt":"Exam figure 1","caption":"Exhibit"},{"src":"assets/exams/ai-900/pdf-page-157-img-1.jpg","alt":"Exam figure 2","caption":"Answer area"}]},{"prompt":"You need to reduce the load on telephone operators by implementing a chatbot to answer simple questions with predefined answers. Which two AI services should you use to achieve the goal? Each correct answers presents part of the solution. NOTE: Each correct selection is worth one point.","options":["Azure Machine Learning","Azure Bot Service","Language Service","Translator"],"correctIndex":0}]}</script>
